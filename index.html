<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e10">
<title>HEARTHHOLD — Realistic Look Test</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;}
  html,body{height:100%;overflow:hidden;background:#0a0e10;color:#eef3f0;}
  #cv{display:block;width:100vw;height:100vh;touch-action:none;}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#0a0e10;z-index:20;}
  #load .l{font-weight:900;letter-spacing:5px;font-size:26px;background:linear-gradient(180deg,#fff,#cdaa6a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #load .s{font-size:12px;opacity:.5;letter-spacing:1px;}
  .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.14);border-top-color:#cdaa6a;border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
  .tl{position:absolute;top:calc(8px + env(safe-area-inset-top));left:10px;display:flex;gap:9px;align-items:flex-start;}
  .lvl{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#3a4452,#171c24);border:2px solid #c9a86a;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;box-shadow:0 3px 10px rgba(0,0,0,.5);}
  .bars{display:flex;flex-direction:column;gap:4px;}
  .bar{width:152px;height:13px;border-radius:7px;background:rgba(8,12,14,.6);border:1px solid rgba(255,255,255,.12);overflow:hidden;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .bar i{position:absolute;inset:0;border-radius:7px;}
  .bar b{position:absolute;right:6px;top:0;font-size:9.5px;line-height:13px;font-weight:700;text-shadow:0 1px 2px #000;}
  .hpf{background:linear-gradient(90deg,#e0473e,#ff7a5e);width:100%;}
  .hgf{background:linear-gradient(90deg,#d98a2b,#ffc24a);width:88%;}
  .wtf{background:linear-gradient(90deg,#2f8fd0,#62c4ff);width:74%;}
  .enf{background:linear-gradient(90deg,#3a9a4a,#7fe06a);width:81%;}
  .quest{position:absolute;top:74px;left:14px;font-size:12px;line-height:1.7;text-shadow:0 1px 3px #000;}
  .quest .h{color:#e8c878;font-weight:800;letter-spacing:.5px;margin-bottom:2px;}
  .quest .q{opacity:.92;}.quest .q i{display:inline-block;width:13px;height:13px;border:1.5px solid #9fb0a4;border-radius:3px;vertical-align:-2px;margin-right:6px;}
  .tr{position:absolute;top:calc(8px + env(safe-area-inset-top));right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .mini{width:92px;height:92px;border-radius:50%;background:radial-gradient(circle at 50% 45%,#4a5a3e,#1c2418);border:2px solid rgba(220,200,150,.55);box-shadow:0 3px 12px rgba(0,0,0,.55);position:relative;overflow:hidden;}
  .mini .blip{position:absolute;width:6px;height:6px;border-radius:50%;}
  .daytime{background:rgba(8,12,14,.62);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:4px 10px;font-weight:800;font-size:12px;letter-spacing:.5px;display:flex;gap:7px;align-items:center;}
  .daytime .sun{color:#ffcf5a;}
  .stick{position:absolute;left:calc(14px + env(safe-area-inset-left));bottom:calc(22px + env(safe-area-inset-bottom));width:112px;height:112px;border-radius:50%;background:rgba(10,14,16,.32);border:2px solid rgba(255,255,255,.18);}
  .stick .nub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(230,235,230,.35);border:1px solid rgba(255,255,255,.4);box-shadow:0 2px 8px rgba(0,0,0,.4);}
  .acts{position:absolute;right:calc(14px + env(safe-area-inset-right));bottom:calc(86px + env(safe-area-inset-bottom));display:flex;gap:12px;align-items:flex-end;}
  .rbtn{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(60,70,80,.85),rgba(20,26,32,.9));border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 3px 10px rgba(0,0,0,.5);}
  .rbtn.big{width:66px;height:66px;border-color:#c9a86a;background:radial-gradient(circle at 40% 35%,rgba(150,110,60,.9),rgba(70,45,20,.95));font-weight:900;font-size:10px;letter-spacing:1px;color:#ffe6b0;flex-direction:column;gap:1px;}
  .hot{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:5px;}
  .slot{width:42px;height:42px;border-radius:8px;background:rgba(10,14,16,.6);border:1px solid rgba(255,255,255,.14);position:relative;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .slot.sel{border-color:#e8c878;box-shadow:0 0 10px rgba(232,200,120,.4);}
  .slot b{position:absolute;right:3px;bottom:1px;font-size:10px;font-weight:800;text-shadow:0 1px 2px #000;}
  .brand{position:fixed;top:calc(8px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-weight:900;letter-spacing:3px;font-size:12px;opacity:.45;z-index:11;background:linear-gradient(180deg,#fff,#cdaa6a);-webkit-background-clip:text;background-clip:text;color:transparent;pointer-events:none;}
  #ctl{position:fixed;left:50%;transform:translateX(-50%);bottom:64px;display:flex;gap:8px;z-index:12;}
  .tb{pointer-events:auto;background:rgba(16,22,26,.8);border:1px solid rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:12px;padding:8px 13px;border-radius:10px;backdrop-filter:blur(6px);}
  .tb.on{background:linear-gradient(180deg,#e8c878,#c9923a);color:#241800;border-color:transparent;}
</style>
</head>
<body>
<div id="load"><div class="l">HEARTHHOLD</div><div class="spin"></div><div class="s">loading the wilds…</div></div>
<canvas id="cv"></canvas>
<div class="brand">HEARTHHOLD · REALISTIC TEST</div>
<div id="hud">
  <div class="tl">
    <div class="lvl">7</div>
    <div class="bars">
      <div class="bar"><i class="hpf"></i><b>100/100</b></div>
      <div class="bar"><i class="hgf"></i><b>88/100</b></div>
      <div class="bar"><i class="wtf"></i><b>74/100</b></div>
      <div class="bar"><i class="enf"></i><b>81/100</b></div>
    </div>
  </div>
  <div class="quest">
    <div class="h">Getting Started</div>
    <div class="q"><i></i>Collect Wood 8/20</div>
    <div class="q"><i></i>Collect Stone 6/10</div>
    <div class="q"><i></i>Build a Shelter 0/1</div>
  </div>
  <div class="tr">
    <div class="mini" id="mini"></div>
    <div class="daytime"><span class="sun">☀</span><span id="clock">DAY 3 · 09:42</span></div>
  </div>
  <div class="stick"><div class="nub"></div></div>
  <div class="acts">
    <div class="rbtn">🎒</div><div class="rbtn">🪓</div><div class="rbtn">✋</div>
    <div class="rbtn big">⚒<span>CRAFT</span></div>
  </div>
  <div class="hot">
    <div class="slot sel">🪓</div><div class="slot">⛏️</div><div class="slot">🗡️</div>
    <div class="slot">🪵<b>8</b></div><div class="slot">🪨<b>6</b></div><div class="slot">🍖<b>2</b></div><div class="slot">🧪<b>1</b></div>
  </div>
</div>
<div id="ctl">
  <button class="tb" id="bDay">☀ Day</button>
  <button class="tb on" id="bDusk">🌆 Dusk</button>
  <button class="tb" id="bNight">🌙 Night</button>
</div>

<script type="importmap">{"imports":{"three":"./three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from './jsm/postprocessing/EffectComposer.js';
import {RenderPass} from './jsm/postprocessing/RenderPass.js';
import {UnrealBloomPass} from './jsm/postprocessing/UnrealBloomPass.js';
import {OutputPass} from './jsm/postprocessing/OutputPass.js';
import {RGBELoader} from './jsm/loaders/RGBELoader.js';

const cv=document.getElementById('cv');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.92;
const MAXA=renderer.capabilities.getMaxAnisotropy();

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(34,1,0.1,400);
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.55,0.5,0.82);
composer.addPass(bloom);
composer.addPass(new OutputPass());

const sun=new THREE.DirectionalLight(0xfff0d4,2.0);
sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=120;
sun.shadow.camera.left=-32;sun.shadow.camera.right=32;sun.shadow.camera.top=32;sun.shadow.camera.bottom=-32;
sun.shadow.bias=-0.0004; sun.shadow.normalBias=0.025;
scene.add(sun,sun.target);
const hemi=new THREE.HemisphereLight(0xbfe0ff,0x3a3026,0.5); scene.add(hemi);
scene.fog=new THREE.Fog(0x9fb0a0,40,150);

const TL=new THREE.TextureLoader();
function tex(url,srgb,rep){const t=TL.load(url);if(srgb)t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;if(rep)t.repeat.set(rep,rep);t.anisotropy=MAXA;return t;}
function mat(c,r=0.9,m=0){return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});}
function box(w,h,d,mt){const me=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mt);me.castShadow=me.receiveShadow=true;return me;}
const rng=(s=>()=>(s=Math.imul(48271,s)%2147483647)/2147483647)(99221);

// ground (realistic PBR)
const gmat=new THREE.MeshStandardMaterial({map:tex('./assets/ff_diff.jpg',true,9),normalMap:tex('./assets/ff_nor.jpg',false,9),roughnessMap:tex('./assets/ff_rough.jpg',false,9),roughness:1,metalness:0});
const gg=new THREE.PlaneGeometry(120,120,80,80); gg.rotateX(-Math.PI/2);
const gp=gg.attributes.position;
for(let i=0;i<gp.count;i++){const x=gp.getX(i),z=gp.getZ(i),d=Math.hypot(x,z);let h=(Math.sin(x*0.09)*Math.cos(z*0.08))*1.3+(rng()-0.5)*0.4;if(d<9)h*=0.1;gp.setY(i,h);}
gg.computeVertexNormals();
const ground=new THREE.Mesh(gg,gmat); ground.receiveShadow=true; scene.add(ground);

// trees
const barkMat=new THREE.MeshStandardMaterial({map:tex('./assets/bark_diff.jpg',true,2),roughness:1});
const needle=[mat(0x2c5230,1),mat(0x356438,1),mat(0x29562e,1)];
function conifer(s){const g=new THREE.Group();const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.18*s,0.32*s,2.2*s,8),barkMat);tr.castShadow=true;tr.position.y=1.1*s;g.add(tr);
  for(let i=0;i<5;i++){const r=(1.5-i*0.24)*s;const c=new THREE.Mesh(new THREE.ConeGeometry(r,1.5*s,9),needle[i%3]);c.castShadow=true;c.receiveShadow=true;c.position.y=(2.0+i*0.85)*s;c.rotation.y=rng()*3;g.add(c);}return g;}
function bush(s){const g=new THREE.Group();for(let i=0;i<3;i++){const b=new THREE.Mesh(new THREE.IcosahedronGeometry((0.5+rng()*0.4)*s,0),needle[i%3]);b.castShadow=true;b.position.set((rng()-0.5)*s,0.4*s,(rng()-0.5)*s);g.add(b);}return g;}
const hero=conifer(2.6); hero.position.set(-1,0,-3.5); scene.add(hero);
for(let i=0;i<70;i++){const a=rng()*Math.PI*2,d=10+rng()*46;const t=conifer(1.1+rng()*1.6);t.position.set(Math.cos(a)*d,0,Math.sin(a)*d);t.rotation.y=rng()*6;scene.add(t);}
for(let i=0;i<40;i++){const a=rng()*Math.PI*2,d=7+rng()*40;const b=bush(0.8+rng()*0.8);b.position.set(Math.cos(a)*d,0,Math.sin(a)*d);scene.add(b);}

// rocks
const rockMat=new THREE.MeshStandardMaterial({color:0x8d8f92,roughness:0.95,flatShading:true});
const rockMat2=new THREE.MeshStandardMaterial({color:0x6f7278,roughness:0.95,flatShading:true});
for(let i=0;i<26;i++){const a=rng()*Math.PI*2,d=5+rng()*44;const r=new THREE.Mesh(new THREE.DodecahedronGeometry(0.4+rng()*1.4,0),rng()>0.5?rockMat:rockMat2);r.castShadow=r.receiveShadow=true;r.position.set(Math.cos(a)*d,0.2+rng()*0.3,Math.sin(a)*d);r.rotation.set(rng()*3,rng()*3,rng()*3);r.scale.y=0.6+rng()*0.5;scene.add(r);}

// camp: campfire
const fire=new THREE.Group();
for(let i=0;i<5;i++){const l=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,1.1,6),barkMat);l.castShadow=true;l.rotation.z=Math.PI/2;l.rotation.y=i*Math.PI/5;l.position.y=0.1;fire.add(l);}
for(let i=0;i<9;i++){const a=i/9*Math.PI*2;const s=new THREE.Mesh(new THREE.DodecahedronGeometry(0.18,0),rockMat);s.position.set(Math.cos(a)*0.62,0.05,Math.sin(a)*0.62);s.castShadow=true;fire.add(s);}
const flameMat=new THREE.MeshStandardMaterial({color:0xff8a20,emissive:0xff5a10,emissiveIntensity:4,roughness:0.4});
const flame=new THREE.Mesh(new THREE.ConeGeometry(0.42,1.2,7),flameMat); flame.position.y=0.75; fire.add(flame);
const flame2=new THREE.Mesh(new THREE.ConeGeometry(0.24,0.8,6),new THREE.MeshStandardMaterial({color:0xffd24a,emissive:0xffcf4d,emissiveIntensity:5})); flame2.position.y=0.85; fire.add(flame2);
fire.position.set(1.5,0,1.5); scene.add(fire);
const fireLight=new THREE.PointLight(0xff7a30,0,28,1.7); fireLight.position.set(1.5,1.4,1.5); scene.add(fireLight);
let fireBase=2;
const eN=70,eg=new THREE.BufferGeometry(),ep=new Float32Array(eN*3),ev=[];
for(let i=0;i<eN;i++){ep[i*3]=1.5+(rng()-0.5)*0.5;ep[i*3+1]=rng()*2;ep[i*3+2]=1.5+(rng()-0.5)*0.5;ev.push(0.5+rng()*1.1);}
eg.setAttribute('position',new THREE.Float32BufferAttribute(ep,3));
const embers=new THREE.Points(eg,new THREE.PointsMaterial({color:0xffae4a,size:0.1,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false}));scene.add(embers);

// lean-to shelter + props
const plankMat=mat(0x6a4e30,0.95);
const shelter=new THREE.Group();
const back=box(2.6,0.1,1.8,plankMat); back.rotation.x=-1.0; back.position.set(0,1.0,-0.4); shelter.add(back);
for(let i=-1;i<=1;i++){const post=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.08,2,6),barkMat);post.castShadow=true;post.position.set(i*1.1,1,0.4);post.rotation.x=0.2;shelter.add(post);}
shelter.position.set(4.2,0,-1.2); shelter.rotation.y=-0.5; scene.add(shelter);
for(let i=0;i<5;i++){const l=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.7,8),barkMat);l.castShadow=true;l.rotation.z=Math.PI/2;l.position.set(0.2+rng()*1.2,0.12,2.6+rng()*0.8);l.rotation.y=rng()*3;scene.add(l);}
const stump=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,0.5,10),barkMat); stump.castShadow=true; stump.position.set(-1.6,0.25,1.8); scene.add(stump);

// survivor for scale
const survivor=new THREE.Group();
const bod=new THREE.Mesh(new THREE.CapsuleGeometry(0.22,0.55,4,8),mat(0x415a6b,0.9)); bod.castShadow=true; bod.position.y=0.6; survivor.add(bod);
const head=new THREE.Mesh(new THREE.SphereGeometry(0.2,12,10),mat(0xd8b48c,0.9)); head.castShadow=true; head.position.y=1.12; survivor.add(head);
survivor.position.set(-0.4,0,2.4); scene.add(survivor);

// HDRI environment
const pmrem=new THREE.PMREMGenerator(renderer); pmrem.compileEquirectangularShader();
new RGBELoader().load('./assets/sky.hdr',hdr=>{hdr.mapping=THREE.EquirectangularReflectionMapping;const env=pmrem.fromEquirectangular(hdr).texture;scene.environment=env;scene.background=env;scene.backgroundBlurriness=0.5;hdr.dispose();pmrem.dispose();reveal();},undefined,()=>{scene.background=new THREE.Color(0x9fb0c0);reveal();});

// camera
let cam={az:0.85,el:0.92,dist:24,tx:1,ty:1.2,tz:0};
function setCam(){const cx=Math.cos(cam.az)*Math.cos(cam.el)*cam.dist,cy=Math.sin(cam.el)*cam.dist,cz=Math.sin(cam.az)*Math.cos(cam.el)*cam.dist;camera.position.set(cam.tx+cx,cam.ty+cy,cam.tz+cz);camera.lookAt(cam.tx,cam.ty,cam.tz);}
let drag=null;
cv.addEventListener('pointerdown',e=>drag={x:e.clientX,y:e.clientY});
window.addEventListener('pointerup',()=>drag=null);
window.addEventListener('pointermove',e=>{if(!drag)return;cam.az-=(e.clientX-drag.x)*0.005;cam.el=Math.max(0.45,Math.min(1.25,cam.el+(e.clientY-drag.y)*0.003));drag={x:e.clientX,y:e.clientY};});
cv.addEventListener('wheel',e=>{cam.dist=Math.max(12,Math.min(44,cam.dist+e.deltaY*0.02));e.preventDefault();},{passive:false});
let pinch=null;
cv.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);if(pinch)cam.dist=Math.max(12,Math.min(44,cam.dist-(d-pinch)*0.04));pinch=d;e.preventDefault();}},{passive:false});
cv.addEventListener('touchend',()=>pinch=null);

function applyTime(t){
  const day=new THREE.Color(0xaecbe6),dusk=new THREE.Color(0xc98a4a),night=new THREE.Color(0x0d1626);
  let sunI,sunC,hemiI,fireI,exposure,fogC;
  if(t<0.5){const k=t/0.5;fogC=day.clone().lerp(dusk,k);sunI=2.2-1.0*k;sunC=new THREE.Color(0xfff0d4).lerp(new THREE.Color(0xff9a52),k);hemiI=0.55-0.2*k;fireI=0.4+1.8*k;exposure=0.95-0.05*k;}
  else{const k=(t-0.5)/0.5;fogC=dusk.clone().lerp(night,k);sunI=1.2-1.15*k;sunC=new THREE.Color(0xff9a52).lerp(new THREE.Color(0x3a4a80),k);hemiI=0.35-0.24*k;fireI=2.2+1.4*k;exposure=0.9+0.18*k;}
  scene.fog.color.copy(fogC);
  sun.intensity=Math.max(0,sunI); sun.color.copy(sunC);
  sun.position.set(Math.cos((0.3+t*0.5)*Math.PI)*45,Math.max(4,(1-t)*45+6),Math.sin((0.3+t*0.4)*Math.PI)*30);
  hemi.intensity=Math.max(0.08,hemiI);
  fireBase=fireI*1.6; fireLight.intensity=fireBase;
  renderer.toneMappingExposure=exposure;
  if(scene.environment) scene.backgroundBlurriness=t<0.5?0.5:0.5+0.4*((t-0.5)/0.5);
  document.getElementById('clock').textContent='DAY 3 · '+(t<0.5?'09:42':t<0.8?'18:20':'21:55');
}
let timeT=0.42;
const TB={bDay:0.0,bDusk:0.42,bNight:0.92};
function setTB(id){['bDay','bDusk','bNight'].forEach(b=>document.getElementById(b).classList.toggle('on',b===id));}
Object.keys(TB).forEach(id=>document.getElementById(id).onclick=()=>{timeT=TB[id];applyTime(timeT);setTB(id);});

const q=new URLSearchParams(location.search);
if(q.has('t'))timeT=parseFloat(q.get('t'));
if(q.has('az'))cam.az=parseFloat(q.get('az'));
const spin=q.get('spin')!=='0';

const mini=document.getElementById('mini');
[['#6cff8a',50,55],['#ffcf4d',60,40],['#ff6a5a',38,46],['#6cff8a',46,62],['#cfe0ff',70,58]].forEach(b=>{const d=document.createElement('div');d.className='blip';d.style.background=b[0];d.style.left=b[1]+'%';d.style.top=b[2]+'%';mini.appendChild(d);});

function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h,false);composer.setSize(w,h);bloom.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
window.addEventListener('resize',resize); resize();

let revealed=false; function reveal(){if(revealed)return;revealed=true;document.getElementById('load').style.display='none';}
setTimeout(reveal,9000);

applyTime(timeT); setTB(q.has('t')?(timeT<0.2?'bDay':timeT<0.7?'bDusk':'bNight'):'bDusk'); setCam();
let last=performance.now(),tsec=0;
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now; tsec+=dt;
  if(spin&&!drag) cam.az+=dt*0.05;
  setCam();
  const fl=0.82+Math.sin(tsec*13)*0.12+Math.sin(tsec*29)*0.05;
  flame.scale.set(0.9+0.2*Math.sin(tsec*9),fl,0.9+0.2*Math.cos(tsec*11));
  flame2.scale.y=0.9+0.25*Math.sin(tsec*16);
  fireLight.intensity=fireBase*(0.8+fl*0.25);
  fireLight.position.y=1.4+Math.sin(tsec*22)*0.1;
  const ap=embers.geometry.attributes.position;
  for(let i=0;i<eN;i++){let y=ap.getY(i)+ev[i]*dt;if(y>2.4){y=0.1;ap.setX(i,1.5+(rng()-0.5)*0.5);ap.setZ(i,1.5+(rng()-0.5)*0.5);}ap.setY(i,y);}
  ap.needsUpdate=true;
  survivor.position.y=Math.abs(Math.sin(tsec*3))*0.04;
  composer.render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
window.__ready=true;
</script>
