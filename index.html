<style>

  html,body{height:100%;overflow:hidden;background:#0a0e10;color:#eef3f0;}
  #cv{display:block;width:100vw;height:100vh;touch-action:none;}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#0a0e10;z-index:20;transition:opacity .5s;}
  #load .l{font-weight:900;letter-spacing:5px;font-size:26px;background:linear-gradient(180deg,#fff,#cdaa6a);-webkit-background-clip:text;background-clip:text;color:transparent;}

  .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.14);border-top-color:#cdaa6a;border-radius:50%;animation:sp 1s linear infinite;}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
  .tl{position:absolute;top:calc(8px + env(safe-area-inset-top));left:10px;display:flex;gap:9px;align-items:flex-start;}
  .lvl{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#3a4452,#171c24);border:2px solid #c9a86a;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;box-shadow:0 3px 10px rgba(0,0,0,.5);}

  .quest .q{opacity:.92;}.quest .q i{display:inline-block;width:13px;height:13px;border:1.5px solid #9fb0a4;border-radius:3px;vertical-align:-2px;margin-right:6px;}
  .tr{position:absolute;top:calc(8px + env(safe-area-inset-top));right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .mini{width:92px;height:92px;border-radius:50%;background:radial-gradient(circle at 50% 45%,#4a5a3e,#1c2418);border:2px solid rgba(220,200,150,.55);box-shadow:0 3px 12px rgba(0,0,0,.55);position:relative;overflow:hidden;}
  .mini .blip{position:absolute;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%);}
  .daytime{background:rgba(8,12,14,.62);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:4px 10px;font-weight:800;font-size:12px;letter-spacing:.5px;display:flex;gap:7px;align-items:center;}

  .stick{position:absolute;left:calc(14px + env(safe-area-inset-left));bottom:calc(22px + env(safe-area-inset-bottom));width:112px;height:112px;border-radius:50%;background:rgba(10,14,16,.32);border:2px solid rgba(255,255,255,.18);pointer-events:auto;}
  .stick .nub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(230,235,230,.35);border:1px solid rgba(255,255,255,.4);box-shadow:0 2px 8px rgba(0,0,0,.4);}
  .acts{position:absolute;right:calc(14px + env(safe-area-inset-right));bottom:calc(86px + env(safe-area-inset-bottom));display:flex;gap:12px;align-items:flex-end;}
  .rbtn{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(60,70,80,.85),rgba(20,26,32,.9));border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 3px 10px rgba(0,0,0,.5);pointer-events:auto;}
  .rbtn.big{width:66px;height:66px;border-color:#c9a86a;background:radial-gradient(circle at 40% 35%,rgba(150,110,60,.9),rgba(70,45,20,.95));font-weight:900;font-size:10px;letter-spacing:1px;color:#ffe6b0;flex-direction:column;gap:1px;}
  .hot{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:5px;}
  .slot{width:42px;height:42px;border-radius:8px;background:rgba(10,14,16,.6);border:1px solid rgba(255,255,255,.14);position:relative;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .slot.sel{border-color:#e8c878;box-shadow:0 0 10px rgba(232,200,120,.4);}
  .slot b{position:absolute;right:3px;bottom:1px;font-size:10px;font-weight:800;text-shadow:0 1px 2px #000;}
  .brand{position:fixed;top:calc(8px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-weight:900;letter-spacing:3px;font-size:12px;opacity:.4;z-index:11;background:linear-gradient(180deg,#fff,#cdaa6a);-webkit-background-clip:text;background-clip:text;color:transparent;pointer-events:none;}
  #ctl{position:fixed;left:50%;transform:translateX(-50%);bottom:64px;display:flex;gap:8px;z-index:12;}
  .tb{pointer-events:auto;background:rgba(16,22,26,.8);border:1px solid rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:12px;padding:8px 13px;border-radius:10px;backdrop-filter:blur(6px);}
  .tb.on{background:linear-gradient(180deg,#e8c878,#c9923a);color:#241800;border-color:transparent;}
  #zoom{position:fixed;right:calc(12px + env(safe-area-inset-right));top:40%;display:flex;flex-direction:column;gap:8px;z-index:12;}

</style>

<body>

<div id="hud">

<script>
'use strict';
//================================================================
//  HEARTHHOLD — 2D semi-top-down survival builder
//  Pure canvas. No external libs. Procedural art with a drop-in
//  sprite pipeline: drop assets/sprites/<name>.png and it auto-
//  replaces the procedural billboard for that object.
//================================================================
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize); resize();

// deterministic rng (always positive — plain mul stays exact within 2^53)
function mkrng(s){s=s%2147483647;if(s<=0)s+=2147483646;return ()=>(s=s*48271%2147483647)/2147483647;}
const rng=mkrng(1337);

//---------------------------------------------------------------
// Drop-in sprite pipeline. spr('cabin') returns an <img> if
// assets/sprites/cabin.png exists & loaded, else null -> procedural.
//---------------------------------------------------------------
const SPRITES={};
function spr(name){
  if(SPRITES[name]===undefined){
    const im=new Image(); SPRITES[name]=null;
    im.onload=()=>{SPRITES[name]=im;};
    im.onerror=()=>{SPRITES[name]=null;};
    im.src='assets/sprites/'+name+'.png?v=1';
    // mark as "pending" so we don't recreate every frame
    SPRITES[name]={pending:true,img:im};
    return null;
  }
  const v=SPRITES[name];
  if(v && v.pending) return v.img.complete && v.img.naturalWidth ? v.img : null;
  return v;
}

//---------------------------------------------------------------
// Semi-top-down projection.
//   world (wx,wy) lives on a ground plane that is tilted away.
//   ground footprint is vertically compressed by TILT.
//   object HEIGHT rises straight up the screen (billboard).
//---------------------------------------------------------------
const TILT=0.60;
const cam={x:0,y:0,zoom:6,zoomT:6};
const ZMIN=3.2, ZMAX=14;
function sx(wx){return W/2 + (wx-cam.x)*cam.zoom;}
function sy(wy){return H*0.54 + (wy-cam.y)*cam.zoom*TILT;}
const sc=()=>cam.zoom; // px per world-unit (horizontal & for billboard height)

//---------------------------------------------------------------
// World definition
//---------------------------------------------------------------
const HEARTH={x:0,y:0};
const objs=[];
let player;
function add(o){o.id=objs.length;objs.push(o);return o;}

// scatter trees / rocks / bushes in a ring, leaving a camp clearing
(function populate(){
  // hearth/campfire at center
  add({type:'fire',x:0,y:6,r:1.4});
  // cabin
  add({type:'cabin',x:-14,y:-8,r:6});
  // a few resource props near camp
  add({type:'crate',x:9,y:2,r:1});
  add({type:'crate',x:11.5,y:4,r:1});
  add({type:'barrel',x:13,y:-3,r:1});
  add({type:'tent',x:16,y:8,r:4});
  // survivor (player)
  player=add({type:'player',x:4,y:14,r:1.1});

  // big stone deposit (resource node)
  add({type:'rocks',x:24,y:-14,r:3});
  add({type:'rocks',x:-26,y:16,r:3});

  // trees: dense ring around the clearing
  const CLEAR=22;
  for(let i=0;i<150;i++){
    const a=rng()*6.283, d=CLEAR+rng()*120;
    const x=Math.cos(a)*d, y=Math.sin(a)*d*0.92;
    const t=rng();
    if(t<0.62) add({type:'pine',x,y,r:2.2+rng()*1.6,seed:rng()*99});
    else if(t<0.8) add({type:'oak',x,y,r:2.4+rng()*1.4,seed:rng()*99});
    else if(t<0.92) add({type:'bush',x,y,r:1.1+rng()*0.6,seed:rng()*99});
    else add({type:'stone',x,y,r:0.8+rng()*0.7,seed:rng()*99});
  }
  // a few hero trees just outside camp for framing
  add({type:'pine',x:-20,y:18,r:4.2,seed:3});
  add({type:'pine',x:22,y:20,r:3.8,seed:7});
  add({type:'oak',x:20,y:-18,r:3.6,seed:11});
})();

//---------------------------------------------------------------
// Ground texture — baked once onto an offscreen canvas, then the
// visible slice is blitted (vertically squashed by TILT) each frame.
//---------------------------------------------------------------
const GW=1800, GH=1800;            // world units covered (centered on 0,0)
const GPX=2;                        // px per world-unit in the bake
const terr=document.createElement('canvas'); terr.width=GW*GPX/2; terr.height=GH*GPX/2;
(function bakeGround(){
  const g=terr.getContext('2d'), w=terr.width, h=terr.height, R=mkrng(7);
  // base grass gradient (lighter toward camp center for focus)
  const base=g.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.6);
  base.addColorStop(0,'#5c7e3a'); base.addColorStop(0.5,'#4e6f33'); base.addColorStop(1,'#3c5828');
  g.fillStyle=base; g.fillRect(0,0,w,h);
  // grass dabs
  for(let i=0;i<26000;i++){
    const x=R()*w,y=R()*h,l=R();
    g.fillStyle=l<0.5?`rgba(40,58,26,${0.05+R()*0.12})`:`rgba(120,150,70,${0.04+R()*0.12})`;
    const s=1+R()*3; g.fillRect(x,y,s,s*0.7);
  }
  // dirt clearing around hearth (camp ground)
  const cx=w/2,cy=h/2, cr=22*GPX/2*1.7;
  const dg=g.createRadialGradient(cx,cy,cr*0.2,cx,cy,cr);
  dg.addColorStop(0,'rgba(120,92,58,0.95)'); dg.addColorStop(0.7,'rgba(110,84,52,0.6)'); dg.addColorStop(1,'rgba(110,84,52,0)');
  g.fillStyle=dg; g.beginPath(); g.ellipse(cx,cy,cr,cr,0,0,7); g.fill();
  for(let i=0;i<5000;i++){const a=R()*6.283,d=R()*cr;const x=cx+Math.cos(a)*d,y=cy+Math.sin(a)*d;g.fillStyle=`rgba(70,52,32,${0.05+R()*0.16})`;const s=1+R()*2.5;g.fillRect(x,y,s,s);}
  // worn path leading off to the NE (toward the stone deposit)
  g.strokeStyle='rgba(112,88,56,0.55)'; g.lineCap='round';
  for(let lane=0;lane<3;lane++){
    g.lineWidth=(7-lane*1.5)*GPX/2; g.beginPath();
    g.moveTo(cx,cy);
    g.bezierCurveTo(cx+30*GPX/2,cy-8*GPX/2, cx+44*GPX/2,cy-22*GPX/2, cx+58*GPX/2,cy-30*GPX/2);
    g.stroke();
  }
  // subtle large mottling for variation
  for(let i=0;i<140;i++){
    const x=R()*w,y=R()*h,rr=20+R()*70;
    g.fillStyle=R()<0.5?`rgba(30,46,20,0.06)`:`rgba(110,138,66,0.05)`;
    g.beginPath();g.ellipse(x,y,rr,rr*0.8,0,0,7);g.fill();
  }
})();
function drawGround(){
  // world rect [-GW/2,GW/2] maps to terr. Blit squashed by TILT.
  const x0=sx(-GW/2), y0=sy(-GH/2);
  const wpx=GW*sc(), hpx=GH*sc()*TILT;
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(terr,0,0,terr.width,terr.height, x0,y0, wpx,hpx);
}

//---------------------------------------------------------------
// Shadow helper (soft ground ellipse)
//---------------------------------------------------------------
function shadow(wx,wy,rw,alpha){
  const x=sx(wx),y=sy(wy),s=sc();
  ctx.save();
  ctx.fillStyle=`rgba(8,16,8,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(x,y,rw*s, rw*s*TILT*0.55, 0,0,7);
  ctx.fill();
  ctx.restore();
}

//---------------------------------------------------------------
// Procedural billboard art (each draws at its world anchor)
//---------------------------------------------------------------
function drawPine(o,t){
  const s=sc(), x=sx(o.x), gy=sy(o.y), R=o.r*s;
  shadow(o.x,o.y,o.r*0.9,0.30);
  const sway=Math.sin(t*0.8+o.seed)*R*0.05;
  // trunk
  const th=R*0.55;
  const tg=ctx.createLinearGradient(x-R*0.12,0,x+R*0.12,0);
  tg.addColorStop(0,'#3a2a18');tg.addColorStop(0.5,'#6b4a2b');tg.addColorStop(1,'#2e2012');
  ctx.fillStyle=tg;
  ctx.fillRect(x-R*0.1, gy-th, R*0.2, th);
  // canopy: 4 stacked, lit on upper-left
  const top=gy-R*3.0;
  const layers=4;
  for(let i=0;i<layers;i++){
    const ly=gy-th - i*(R*0.62);
    const lw=R*(1.15-i*0.2);
    const lh=R*0.95;
    const cx=x+sway*(i+1)/layers;
    const gd=ctx.createLinearGradient(cx-lw,ly-lh,cx+lw,ly);
    gd.addColorStop(0,'#3f7a3a');gd.addColorStop(0.5,'#2f5e2c');gd.addColorStop(1,'#1d3d1c');
    ctx.fillStyle=gd;
    ctx.beginPath();
    ctx.moveTo(cx,ly-lh);
    ctx.lineTo(cx-lw,ly+lh*0.25);
    ctx.quadraticCurveTo(cx,ly+lh*0.05,cx+lw,ly+lh*0.25);
    ctx.closePath(); ctx.fill();
    // highlight rim
    ctx.fillStyle='rgba(150,200,120,0.18)';
    ctx.beginPath();
    ctx.moveTo(cx,ly-lh);
    ctx.lineTo(cx-lw*0.5,ly-lh*0.2);
    ctx.lineTo(cx-lw*0.1,ly-lh*0.3);
    ctx.closePath(); ctx.fill();
  }
}
function drawOak(o,t){
  const s=sc(), x=sx(o.x), gy=sy(o.y), R=o.r*s;
  shadow(o.x,o.y,o.r,0.30);
  const sway=Math.sin(t*0.7+o.seed)*R*0.04;
  const th=R*0.9;
  const tg=ctx.createLinearGradient(x-R*0.16,0,x+R*0.16,0);
  tg.addColorStop(0,'#3a2a18');tg.addColorStop(0.5,'#705235');tg.addColorStop(1,'#2e2012');
  ctx.fillStyle=tg; ctx.fillRect(x-R*0.14, gy-th, R*0.28, th);
  // canopy: clustered blobs
  const cy=gy-th-R*1.0+ -0;
  const blobs=[[0,-R*1.0,R*1.25],[-R*0.8,-R*0.6,R*0.95],[R*0.8,-R*0.6,R*0.95],[-R*0.4,-R*1.4,R*0.85],[R*0.4,-R*1.4,R*0.85]];
  // dark base pass
  for(const b of blobs){ctx.fillStyle='#1c3a1b';ctx.beginPath();ctx.ellipse(x+b[0]+sway,cy+b[1],b[2]*1.02,b[2]*0.92,0,0,7);ctx.fill();}
  // lit pass
  for(const b of blobs){
    const gd=ctx.createRadialGradient(x+b[0]-b[2]*0.4+sway,cy+b[1]-b[2]*0.4,b[2]*0.1, x+b[0]+sway,cy+b[1],b[2]);
    gd.addColorStop(0,'#5a9a44');gd.addColorStop(0.6,'#3c7234');gd.addColorStop(1,'#274d24');
    ctx.fillStyle=gd;ctx.beginPath();ctx.ellipse(x+b[0]+sway,cy+b[1],b[2]*0.92,b[2]*0.82,0,0,7);ctx.fill();
  }
}
function drawBush(o,t){
  const s=sc(), x=sx(o.x), gy=sy(o.y), R=o.r*s;
  shadow(o.x,o.y,o.r,0.26);
  const blobs=[[0,0,R],[-R*0.7,R*0.1,R*0.7],[R*0.7,R*0.05,R*0.7]];
  for(const b of blobs){ctx.fillStyle='#1d3c1c';ctx.beginPath();ctx.ellipse(x+b[0],gy-R*0.5+b[1],b[2],b[2]*0.85,0,0,7);ctx.fill();}
  for(const b of blobs){const gd=ctx.createRadialGradient(x+b[0]-b[2]*0.4,gy-R*0.8+b[1],1,x+b[0],gy-R*0.5+b[1],b[2]);gd.addColorStop(0,'#4f8a3c');gd.addColorStop(1,'#2c5526');ctx.fillStyle=gd;ctx.beginPath();ctx.ellipse(x+b[0],gy-R*0.5+b[1],b[2]*0.9,b[2]*0.72,0,0,7);ctx.fill();}
}
function drawStone(o){
  const s=sc(), x=sx(o.x), gy=sy(o.y), R=o.r*s;
  shadow(o.x,o.y,o.r,0.28);
  const gd=ctx.createLinearGradient(x-R,gy-R*1.2,x+R,gy);
  gd.addColorStop(0,'#9aa2a8');gd.addColorStop(0.5,'#6f777d');gd.addColorStop(1,'#454b50');
  ctx.fillStyle=gd;
  ctx.beginPath();

// fire: stone ring + crisscross logs + animated flame + embers + glow
const embers=[]; for(let i=0;i<26;i++)embers.push({a:rng()*6.283,d:rng()*1.2,h:rng()*2,sp:0.5+rng(),sz:rng()});
function drawFireBase(o){
  const s=sc(), x=sx(o.x), gy=sy(o.y), R=o.r*s;

function drawFireFlame(o,t){

  function flame(col,h,wd,off){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x-wd,gy);ctx.quadraticCurveTo(x-wd*0.7,gy-h*0.5,x+Math.sin(t*9+off)*wd*0.5,gy-h);ctx.quadraticCurveTo(x+wd*0.7,gy-h*0.5,x+wd,gy);ctx.quadraticCurveTo(x,gy+R*0.1,x-wd,gy);ctx.fill();}

// Dispatch table: procedural draw OR drop-in sprite if present
//---------------------------------------------------------------
const DRAW={pine:drawPine,oak:drawOak,bush:drawBush,stone:drawStone,rocks:drawRocks,crate:drawCrate,barrel:drawBarrel,tent:drawTent,cabin:drawCabin,player:drawPlayer,fire:drawFireBase};
function drawObj(o,t){
  const im=spr(o.type);
  if(im){
    // sprite billboard: anchored at ground point, height scaled to object
    const s=sc(), x=sx(o.x), gy=sy(o.y);
    const hpx=o.r*s*3.2, wpx=hpx*(im.width/im.height);
    shadow(o.x,o.y,o.r,0.3);
    ctx.drawImage(im, x-wpx/2, gy-hpx, wpx, hpx);
  } else {
    (DRAW[o.type]||(()=>{}))(o,t);
  }
}

//---------------------------------------------------------------
// Day / night lighting overlay
//---------------------------------------------------------------
let NIGHT=0; // 0 day .. 1 deep night
let timePhase=0.0;            // 0 day, 0.5 dusk, 1 night target
const SKY={day:'#9ec6e8',dusk:'#caa15f',night:'#0d1626'};
function lerpColor(a,b,t){const pa=hx(a),pb=hx(b);return `rgb(${pa[0]+(pb[0]-pa[0])*t|0},${pa[1]+(pb[1]-pa[1])*t|0},${pa[2]+(pb[2]-pa[2])*t|0})`;}
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function skyColor(){
  if(timePhase<0.5)return lerpColor(SKY.day,SKY.dusk,timePhase/0.5);
  return lerpColor(SKY.dusk,SKY.night,(timePhase-0.5)/0.5);
}
function lightingOverlay(){
  NIGHT=Math.max(0,(timePhase-0.45)/0.55);
  if(timePhase<0.04)return;
  ctx.save();
  if(timePhase<0.5){ // warm dusk wash
    ctx.globalCompositeOperation='multiply';
    ctx.fillStyle=lerpColor('#ffffff','#e7b070',timePhase/0.5*0.9);
    ctx.fillRect(0,0,W,H);
  } else {
    const k=(timePhase-0.5)/0.5;
    ctx.globalCompositeOperation='multiply';
    ctx.fillStyle=lerpColor('#e7b070','#34406e',k);
    ctx.fillRect(0,0,W,H);
    // deep blue darken on top
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=`rgba(8,14,34,${0.32*k})`;
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}
function vignette(){
  const g=ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.3,W/2,H*0.5,Math.max(W,H)*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${0.28+NIGHT*0.3})`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

//---------------------------------------------------------------
// Main render
//---------------------------------------------------------------
let t0=performance.now(), tsec=0;
function frame(now){
  const dt=Math.min(0.05,(now-(frame._l||now))/1000); frame._l=now; tsec+=dt;
  // camera follow input
  cam.zoom+=(cam.zoomT-cam.zoom)*Math.min(1,dt*8);
  updatePlayer(dt);
  // sky
  ctx.fillStyle=skyColor(); ctx.fillRect(0,0,W,H);
  // distant tree-line silhouette band for depth
  drawHorizon();
  drawGround();
  // sort by world-y (painter) and draw; flame drawn after its base via 2-pass for fire
  const sorted=objs.slice().sort((a,b)=>a.y-b.y);
  for(const o of sorted) drawObj(o,tsec);
  // fire flames on top (after sorting so glow reads), in y-order
  for(const o of sorted) if(o.type==='fire') drawFireFlame(o,tsec);
  lightingOverlay();
  vignette();
  syncHUD();
  requestAnimationFrame(frame);
}
function drawHorizon(){
  // a soft band of far hills near the top of the ground plane
  const y=sy(-GH/2)+20;
  const g=ctx.createLinearGradient(0,y-60,0,y+40);
  g.addColorStop(0,'rgba(40,60,40,0)');g.addColorStop(1,'rgba(26,44,28,0.85)');
  ctx.fillStyle=g; ctx.fillRect(0,Math.max(0,y-60),W,100);
}

//---------------------------------------------------------------
// Player movement (joystick + tap-to-move)
//---------------------------------------------------------------
const input={dx:0,dy:0,active:false};
let moveTarget=null;
function updatePlayer(dt){
  if(!player)return;
  let vx=0,vy=0;
  if(input.active && (input.dx||input.dy)){vx=input.dx;vy=input.dy;moveTarget=null;}
  else if(moveTarget){const ddx=moveTarget.x-player.x,ddy=moveTarget.y-player.y,d=Math.hypot(ddx,ddy);if(d<0.6){moveTarget=null;}else{vx=ddx/d;vy=ddy/d;}}
  const sp=14;
  player.moving=!!(vx||vy);
  player.x+=vx*sp*dt; player.y+=vy*sp*dt;
  // keep camera gently centered on player
  cam.x+=(player.x-cam.x)*Math.min(1,dt*3);
  cam.y+=((player.y-18)-cam.y)*Math.min(1,dt*3);
}

//---------------------------------------------------------------
// HUD sync (minimap + clock)
//---------------------------------------------------------------
const mini=document.getElementById('mini');
function syncHUD(){
  // clock label
  const cl=document.getElementById('clock'),si=document.getElementById('sunIcon');
  if(timePhase<0.35){cl.textContent='DAY 3 · 09:42';si.textContent='☀';}
  else if(timePhase<0.7){cl.textContent='DAY 3 · 18:20';si.textContent='🌆';}
  else{cl.textContent='NIGHT 3 · 21:55';si.textContent='🌙';}
  // minimap blips (rebuilt each ~6 frames is fine, cheap enough each frame)
  if((frame._mc=(frame._mc||0)+1)%4===0){
    mini.querySelectorAll('.blip').forEach(b=>b.remove());
    const cxp=46,cyp=46, mscale=0.32;
    function blip(wx,wy,col){const d=document.createElement('div');d.className='blip';d.style.background=col;d.style.left=(cxp+(wx-cam.x)*mscale)+'px';d.style.top=(cyp+(wy-cam.y)*mscale*0.9)+'px';mini.appendChild(d);}
    blip(0,6,'#ffcf4d');                 // hearth
    if(player)blip(player.x,player.y,'#6cff8a'); // you
    blip(-14,-8,'#cfe0ff');              // cabin
    blip(24,-14,'#c0c6cc');blip(-26,16,'#c0c6cc'); // stone
  }
}

//---------------------------------------------------------------
// Controls — pan (drag empty), tap-to-move, pinch zoom, joystick
//---------------------------------------------------------------
function screenToWorld(px,py){return {x:cam.x+(px-W/2)/cam.zoom, y:cam.y+(py-H*0.54)/(cam.zoom*TILT)};}
// joystick
const stick=document.getElementById('stick'), nub=document.getElementById('nub');
let stickId=null,stickC=null;
function stickStart(e){const tp=e.touches?e.touches[0]:e;const r=stick.getBoundingClientRect();stickC={x:r.left+r.width/2,y:r.top+r.height/2};stickId=e.touches?tp.identifier:'m';input.active=true;stickMove(e);}
function stickMove(e){if(!stickC)return;let tp;if(e.touches){tp=[...e.touches].find(t=>t.identifier===stickId);if(!tp)return;}else tp=e;let dx=tp.clientX-stickC.x,dy=tp.clientY-stickC.y;const d=Math.hypot(dx,dy),max=46;if(d>max){dx*=max/d;dy*=max/d;}nub.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;input.dx=dx/max;input.dy=dy/max;}
function stickEnd(){stickC=null;stickId=null;input.active=false;input.dx=input.dy=0;nub.style.transform='translate(-50%,-50%)';}
stick.addEventListener('touchstart',e=>{stickStart(e);e.preventDefault();},{passive:false});
stick.addEventListener('touchmove',e=>{stickMove(e);e.preventDefault();},{passive:false});
stick.addEventListener('touchend',e=>{stickEnd();e.preventDefault();},{passive:false});
stick.addEventListener('mousedown',stickStart);
window.addEventListener('mousemove',e=>{if(stickC&&stickId==='m')stickMove(e);});
window.addEventListener('mouseup',()=>{if(stickId==='m')stickEnd();});

// canvas: tap-to-move + pinch zoom
let pinch=null;
function dist2(ts){return Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY);}
cv.addEventListener('touchstart',e=>{if(e.touches.length>=2){pinch=dist2(e.touches);} else {const t=e.touches[0];moveTarget=screenToWorld(t.clientX,t.clientY);} },{passive:true});
cv.addEventListener('touchmove',e=>{if(e.touches.length>=2&&pinch){const d=dist2(e.touches);cam.zoomT=Math.max(ZMIN,Math.min(ZMAX,cam.zoomT*(d/pinch)));pinch=d;e.preventDefault();}},{passive:false});
cv.addEventListener('touchend',e=>{if(e.touches.length<2)pinch=null;},{passive:true});
cv.addEventListener('mousedown',e=>{moveTarget=screenToWorld(e.clientX,e.clientY);});
cv.addEventListener('wheel',e=>{cam.zoomT=Math.max(ZMIN,Math.min(ZMAX,cam.zoomT*(e.deltaY<0?1.1:0.9)));e.preventDefault();},{passive:false});
document.getElementById('zin').onclick=()=>cam.zoomT=Math.min(ZMAX,cam.zoomT*1.2);
document.getElementById('zout').onclick=()=>cam.zoomT=Math.max(ZMIN,cam.zoomT*0.83);

// time-of-day buttons
const TB={bDay:0.0,bDusk:0.5,bNight:0.95};
function setTB(id){['bDay','bDusk','bNight'].forEach(b=>document.getElementById(b).classList.toggle('on',b===id));}
Object.keys(TB).forEach(id=>document.getElementById(id).onclick=()=>{animateTime(TB[id]);setTB(id);});
let timeAnim=null;
function animateTime(target){const from=timePhase,t0=performance.now();timeAnim={from,target,t0};(function step(){const k=Math.min(1,(performance.now()-timeAnim.t0)/700);timePhase=timeAnim.from+(timeAnim.target-timeAnim.from)*k;if(k<1)requestAnimationFrame(step);})();}

// query overrides for quick testing
const q=new URLSearchParams(location.search);
if(q.has('t')){timePhase=parseFloat(q.get('t'));setTB(timePhase<0.3?'bDay':timePhase<0.7?'bDusk':'bNight');}
if(q.has('zoom'))cam.zoom=cam.zoomT=parseFloat(q.get('zoom'));

// boot
function boot(){const l=document.getElementById('load');l.style.opacity='0';setTimeout(()=>l.style.display='none',500);requestAnimationFrame(frame);}
setTimeout(boot,300);
window.__ready=true;
</script>
