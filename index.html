<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e10">
<title>HEARTHHOLD</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;}
  html,body{height:100%;overflow:hidden;background:#0a0e10;color:#eef3f0;}
  #cv{display:block;width:100vw;height:100vh;touch-action:none;}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#0a0e10;z-index:30;transition:opacity .5s;}
  #load .l{font-weight:900;letter-spacing:5px;font-size:26px;background:linear-gradient(180deg,#fff,#cdaa6a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #load .s{font-size:12px;opacity:.5;letter-spacing:1px;}
  .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.14);border-top-color:#cdaa6a;border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
  /* top-left cluster */
  .tl{position:absolute;top:calc(8px + env(safe-area-inset-top));left:10px;}
  .toprow{display:flex;gap:9px;align-items:center;}
  .lvl{width:42px;height:42px;border-radius:11px;background:radial-gradient(circle at 40% 35%,#3a4452,#171c24);border:2px solid #c9a86a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;line-height:1;box-shadow:0 3px 10px rgba(0,0,0,.5);}
  .lvl .d{font-size:16px;}.lvl .x{font-size:7px;opacity:.7;letter-spacing:1px;margin-top:1px;}
  .hearthbar{width:170px;}
  .hlab{font-size:9px;font-weight:800;letter-spacing:1px;opacity:.8;margin-bottom:2px;text-shadow:0 1px 2px #000;}
  .bar{height:14px;border-radius:7px;background:rgba(8,12,14,.6);border:1px solid rgba(255,255,255,.12);overflow:hidden;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .bar i{position:absolute;inset:0;border-radius:7px;transition:width .2s;}
  .bar b{position:absolute;right:6px;top:0;font-size:9.5px;line-height:14px;font-weight:700;text-shadow:0 1px 2px #000;}
  .hpf{background:linear-gradient(90deg,#e0473e,#ff7a5e);width:100%;}
  .res{margin-top:8px;display:flex;gap:11px;font-size:13px;font-weight:800;text-shadow:0 1px 3px #000;}
  .res span{display:flex;gap:3px;align-items:center;}
  .res .pop{color:#bfe6c4;}
  .hint{margin-top:7px;font-size:11px;max-width:210px;line-height:1.5;color:#dfe6df;opacity:.92;text-shadow:0 1px 3px #000;}
  .hint b{color:#e8c878;}
  /* top-right */
  .tr{position:absolute;top:calc(8px + env(safe-area-inset-top));right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .mini{width:88px;height:88px;border-radius:14px;background:radial-gradient(circle at 50% 45%,#3f5234,#161d12);border:2px solid rgba(220,200,150,.5);box-shadow:0 3px 12px rgba(0,0,0,.55);position:relative;overflow:hidden;}
  .mini .blip{position:absolute;border-radius:50%;transform:translate(-50%,-50%);}
  .daytime{background:rgba(8,12,14,.62);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:4px 10px;font-weight:800;font-size:12px;letter-spacing:.5px;display:flex;gap:7px;align-items:center;}
  /* build bar */
  #buildbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(8px + env(safe-area-inset-bottom));display:flex;gap:7px;z-index:12;padding:0 8px;max-width:100vw;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  #buildbar::-webkit-scrollbar{display:none;}
  .bchip{pointer-events:auto;flex:0 0 auto;width:66px;border-radius:12px;background:rgba(16,22,26,.86);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(6px);padding:6px 4px 5px;display:flex;flex-direction:column;align-items:center;gap:1px;box-shadow:0 3px 10px rgba(0,0,0,.45);transition:transform .1s;}
  .bchip:active{transform:scale(.94);}
  .bchip.sel{border-color:#e8c878;box-shadow:0 0 0 1px #e8c878,0 0 14px rgba(232,200,120,.45);}
  .bchip.cant{opacity:.45;}
  .bchip .i{font-size:22px;line-height:1;}
  .bchip .n{font-size:8.5px;font-weight:800;letter-spacing:.2px;opacity:.92;}
  .bchip .c{font-size:8.5px;font-weight:700;display:flex;gap:4px;color:#cdd6cf;}
  .bchip .c.no{color:#ff8a7a;}
  /* primary action */
  #night{position:fixed;right:calc(12px + env(safe-area-inset-right));bottom:calc(96px + env(safe-area-inset-bottom));z-index:12;pointer-events:auto;border:none;border-radius:16px;padding:12px 16px;font-weight:900;font-size:13px;letter-spacing:1px;color:#2a1500;background:linear-gradient(180deg,#ffd06a,#e0902f);box-shadow:0 4px 14px rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;gap:1px;}
  #night.fighting{background:linear-gradient(180deg,#7a4a9a,#3a2150);color:#ffe;animation:pulseN 1.4s ease-in-out infinite;}
  #night .sub{font-size:8.5px;font-weight:700;opacity:.85;letter-spacing:.5px;}
  @keyframes pulseN{50%{box-shadow:0 4px 22px rgba(180,90,220,.6);}}
  #bpop{position:fixed;z-index:15;display:none;flex-direction:column;gap:5px;transform:translate(-50%,-100%);background:rgba(14,19,23,.94);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:8px;box-shadow:0 6px 20px rgba(0,0,0,.55);backdrop-filter:blur(8px);}
  #bpop .ttl{font-size:11px;font-weight:800;letter-spacing:.5px;opacity:.85;text-align:center;margin-bottom:1px;}
  #bpop button{pointer-events:auto;border:none;border-radius:8px;padding:8px 12px;font-weight:800;font-size:12px;white-space:nowrap;}
  #bpop .asn{background:linear-gradient(180deg,#7fd08a,#3f9a55);color:#06210e;}
  #bpop .rm{background:linear-gradient(180deg,#e98a7a,#b5483a);color:#2a0c08;}
  #zoom{position:fixed;right:calc(12px + env(safe-area-inset-right));top:34%;display:flex;flex-direction:column;gap:8px;z-index:12;}
  .zb{pointer-events:auto;width:42px;height:42px;border-radius:50%;background:rgba(16,22,26,.8);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;font-weight:700;backdrop-filter:blur(6px);}
  #cancel{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + env(safe-area-inset-bottom));z-index:13;pointer-events:auto;display:none;background:rgba(40,18,18,.9);border:1px solid #ff8a7a;color:#ffd9d2;font-weight:800;font-size:12px;padding:8px 16px;border-radius:11px;}
  .brand{position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-weight:900;letter-spacing:3px;font-size:11px;opacity:.32;z-index:9;background:linear-gradient(180deg,#fff,#cdaa6a);-webkit-background-clip:text;background-clip:text;color:transparent;pointer-events:none;}
  /* toast */
  #toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:14;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .tmsg{background:rgba(10,14,16,.82);border:1px solid rgba(255,255,255,.16);padding:7px 15px;border-radius:11px;font-weight:800;font-size:13px;text-shadow:0 1px 2px #000;opacity:0;transform:translateY(-8px);transition:all .25s;}
  .tmsg.show{opacity:1;transform:translateY(0);}
  /* game over / banner */
  #over{position:fixed;inset:0;z-index:25;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:rgba(6,8,10,.82);backdrop-filter:blur(4px);}
  #over h1{font-size:34px;font-weight:900;letter-spacing:3px;background:linear-gradient(180deg,#fff,#e0902f);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #over p{opacity:.85;font-size:15px;}
  #over button{margin-top:6px;border:none;border-radius:13px;padding:13px 30px;font-weight:900;font-size:14px;letter-spacing:1px;color:#2a1500;background:linear-gradient(180deg,#ffd06a,#e0902f);box-shadow:0 4px 14px rgba(0,0,0,.5);}
  #banner{position:fixed;left:50%;top:36%;transform:translateX(-50%);z-index:14;pointer-events:none;text-align:center;opacity:0;transition:opacity .4s;}
  #banner.show{opacity:1;}
  #banner .big{font-size:30px;font-weight:900;letter-spacing:4px;text-shadow:0 2px 12px rgba(0,0,0,.7);}
  #banner .sm{font-size:13px;opacity:.85;letter-spacing:1px;margin-top:3px;}
</style>
</head>
<body>
<div id="load"><div class="l">HEARTHHOLD</div><div class="spin"></div><div class="s">waking the wilds…</div></div>
<canvas id="cv"></canvas>
<div class="brand">HEARTHHOLD</div>
<div id="hud">
  <div class="tl">
    <div class="toprow">
      <div class="lvl"><span class="d" id="dayNum">1</span><span class="x">DAY</span></div>
      <div class="hearthbar">
        <div class="hlab">🔥 HEARTH</div>
        <div class="bar"><i class="hpf" id="bHearth"></i><b id="tHearth">1000/1000</b></div>
      </div>
    </div>
    <div class="res">
      <span>🪵<b id="rWood">120</b></span><span>🪨<b id="rStone">60</b></span><span>🍖<b id="rFood">40</b></span><span>🪙<b id="rGold">0</b></span>
      <span class="pop">👤<b id="rPop">3/4</b></span>
    </div>
    <div class="hint" id="hint">Tap a <b>resource node</b> to send a villager. Build defenses, then press <b>Begin Night</b>.</div>
  </div>
  <div class="tr">
    <div class="mini" id="mini"></div>
    <div class="daytime"><span id="sunIcon">☀</span><span id="clock">DAY 1</span></div>
  </div>
</div>
<div id="zoom"><button class="zb" id="zin">＋</button><button class="zb" id="zout">－</button></div>
<button id="night">⚔ BEGIN NIGHT<span class="sub" id="nightSub">send the horde</span></button>
<button id="cancel">✕ Cancel placement</button>
<div id="buildbar"></div>
<div id="bpop"></div>
<div id="toast"></div>
<div id="banner"><div class="big" id="bannerBig"></div><div class="sm" id="bannerSm"></div></div>
<div id="over"><h1 id="overTitle">THE HEARTH FELL</h1><p id="overText"></p><button id="restart">↺ Try Again</button></div>

<script>
'use strict';
//================================================================
//  HEARTHHOLD — 2D semi-top-down survival base-builder
//  Build by day · defend by night · everything instant.
//  Pure canvas, no libs. Procedural art + drop-in sprite pipeline
//  (assets/sprites/<name>.png auto-replaces procedural art).
//================================================================
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize); resize();
function mkrng(s){s=s%2147483647;if(s<=0)s+=2147483646;return ()=>(s=s*48271%2147483647)/2147483647;}
const rng=mkrng(1337);

//----- drop-in sprite pipeline -----
const SPRITES={};
function spr(name){
  if(SPRITES[name]===undefined){const im=new Image();im.src='assets/sprites/'+name+'.png?v=1';SPRITES[name]={img:im};return null;}
  const v=SPRITES[name];
  return (v&&v.img&&v.img.complete&&v.img.naturalWidth)?v.img:null;
}

//----- projection: semi-top-down -----
const TILT=0.60;
const cam={x:0,y:0,zoom:6,zoomT:6};
const ZMIN=3.4, ZMAX=13;
function sx(wx){return W/2 + (wx-cam.x)*cam.zoom;}
function sy(wy){return H*0.52 + (wy-cam.y)*cam.zoom*TILT;}
const sc=()=>cam.zoom;
function screenToWorld(px,py){return {x:cam.x+(px-W/2)/cam.zoom, y:cam.y+(py-H*0.52)/(cam.zoom*TILT)};}

//----- grid -----
const TILE=4.4, GN=46;                 // tiles, world-units per tile
const HC=GN>>1;                         // hearth tile coord
function tileWX(tx){return (tx-HC)*TILE;}
function tileWY(ty){return (ty-HC)*TILE;}
function worldToTile(wx,wy){return {tx:Math.round(wx/TILE)+HC, ty:Math.round(wy/TILE)+HC};}
const cellB=new Array(GN*GN).fill(null);   // building occupancy
const cellN=new Array(GN*GN).fill(null);   // node occupancy
function inGrid(tx,ty){return tx>=0&&ty>=0&&tx<GN&&ty<GN;}
const BZONE=40;                            // world radius of the buildable camp
function inZone(tx,ty){return Math.hypot(tileWX(tx),tileWY(ty))<=BZONE;}
function placeable(tx,ty){return inGrid(tx,ty)&&inZone(tx,ty)&&!cellB[ty*GN+tx]&&!cellN[ty*GN+tx]&&!(tx===HC&&ty===HC);}

//================================================================
//  GAME STATE
//================================================================
const G={
  res:{wood:120,stone:60,food:40,gold:0},
  pop:0, popCap:4,
  day:1, phase:'day',                  // 'day' | 'night'
  hearthHP:1000, hearthMax:1000,
  sel:null,                            // selected build key
  over:false,
};
const scenery=[];   // non-interactive trees/rocks
const nodes=[];     // resource nodes
const builds=[];    // player buildings (incl walls/towers)
const villagers=[];
const enemies=[];
const shots=[];     // projectiles
const fx=[];        // floating text / sparks
function add(arr,o){arr.push(o);return o;}

//----- building catalog -----
const CAT={
  house :{name:'House',  ico:'🏠', cost:{wood:35},          hp:240, block:true, pop:2,  desc:'+2 villagers'},
  wall  :{name:'Wall',   ico:'🧱', cost:{wood:6,stone:6},   hp:340, block:true,         desc:'blocks the horde'},
  arrow :{name:'Arrow',  ico:'🏹', cost:{wood:28,stone:18}, hp:170, block:true, range:36, rate:0.65, dmg:13, desc:'fast single shot'},
  cannon:{name:'Cannon', ico:'💣', cost:{stone:45,gold:8},  hp:200, block:true, range:32, rate:1.7, dmg:46, aoe:11, desc:'splash damage'},
  farm  :{name:'Farm',   ico:'🌾', cost:{wood:24},          hp:120, block:true, node:'food', desc:'assign to farm food'},
};
const ORDER=['house','wall','arrow','cannon','farm'];

//================================================================
//  WORLD SETUP
//================================================================
function setupWorld(){
  // forest ring — kept OUTSIDE the buildable camp so build rules are consistent
  for(let i=0;i<200;i++){
    const a=rng()*6.283, d=BZONE+7+rng()*125;
    const x=Math.cos(a)*d, y=Math.sin(a)*d*0.95;
    const t=rng();
    if(t<0.6) add(scenery,{type:'pine',x,y,r:2.2+rng()*1.7,seed:rng()*99});
    else if(t<0.8) add(scenery,{type:'oak',x,y,r:2.4+rng()*1.4,seed:rng()*99});
    else if(t<0.92) add(scenery,{type:'bush',x,y,r:1.0+rng()*0.6,seed:rng()*99});
    else add(scenery,{type:'stone',x,y,r:0.8+rng()*0.6,seed:rng()*99});
  }
  // resource nodes ringed just outside the camp (their trees stay out of the build grid)
  addNode('wood', 9, -4);
  addNode('wood', -9, 6);
  addNode('wood', 2, 10);
  addNode('stone', -11, -8);
  addNode('stone', 12, 7);
  // a few hero trees framing the clearing (outside the build zone)
  add(scenery,{type:'pine',x:-32,y:24,r:4.4,seed:3});
  add(scenery,{type:'pine',x:34,y:27,r:4.0,seed:7});
  // starting villagers
  for(let i=0;i<3;i++) spawnVillager();
  // a starter house (shows the dropped-in cabin sprite immediately)
  starterBuild('house', HC-3, HC-3);
}
function starterBuild(key,tx,ty){const d=CAT[key];const b=add(builds,{key,type:key,x:tileWX(tx),y:tileWY(ty),tx,ty,hp:d.hp,max:d.hp,block:true,cd:0,...d});cellB[ty*GN+tx]=b;return b;}
function addNode(kind, tx, ty){
  const wx=tx*TILE, wy=ty*TILE;
  const n=add(nodes,{kind,x:wx,y:wy,tx:tx+HC,ty:ty+HC,workers:0});
  cellN[(ty+HC)*GN+(tx+HC)]=n;
  // decorate the node with matching scenery
  if(kind==='wood'){for(let i=0;i<3;i++)add(scenery,{type:'pine',x:wx+(rng()-.5)*5,y:wy+(rng()-.5)*4,r:2.6+rng(),seed:rng()*99,node:n});}
  else {add(scenery,{type:'rocks',x:wx,y:wy,r:2.6,seed:rng()*99,node:n});}
  return n;
}
function spawnVillager(){
  if(G.pop>=G.popCap) return false;
  const a=rng()*6.283, d=4+rng()*3;
  add(villagers,{x:Math.cos(a)*d,y:6+Math.sin(a)*d,state:'idle',node:null,carry:0,t:0,wob:rng()*6.28,
    hx:Math.cos(a)*d,hy:6+Math.sin(a)*d});
  G.pop++; return true;
}

//================================================================
//  FLOW FIELD (BFS from hearth; buildings block → walls redirect)
//================================================================
const flow=new Float32Array(GN*GN);
function occupied(tx,ty){const b=cellB[ty*GN+tx];return b&&b.block;}
function computeFlow(){
  flow.fill(1e9);
  const q=[[HC,HC]]; flow[HC*GN+HC]=0;
  for(let i=0;i<q.length;i++){
    const x=q[i][0],y=q[i][1],d=flow[y*GN+x];
    const nb=[[1,0],[-1,0],[0,1],[0,-1]];
    for(let k=0;k<4;k++){const nx=x+nb[k][0],ny=y+nb[k][1];
      if(!inGrid(nx,ny))continue;const idx=ny*GN+nx;
      if(flow[idx]<=d+1)continue;
      if(occupied(nx,ny))continue;
      flow[idx]=d+1; q.push([nx,ny]);
    }
  }
}
computeFlow();

//================================================================
//  GROUND (baked once)
//================================================================
const GW=1500, GH=1500;
const terr=document.createElement('canvas'); terr.width=1600; terr.height=1600;
let groundApplied=null;   // null=not baked, false=procedural, true=sprite-tiled
function bakeGround(img){
  const g=terr.getContext('2d'), w=terr.width, h=terr.height, R=mkrng(7);
  if(img){ // tile a seamless grass texture, then soft focus vignette
    const ts=Math.max(180,w/7);for(let y=0;y<h;y+=ts)for(let x=0;x<w;x+=ts)g.drawImage(img,x,y,ts,ts);
    const lg=g.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.62);lg.addColorStop(0,'rgba(255,255,230,0.10)');lg.addColorStop(1,'rgba(18,28,12,0.20)');g.fillStyle=lg;g.fillRect(0,0,w,h);
  } else {
    const base=g.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.62);
    base.addColorStop(0,'#5f823c');base.addColorStop(0.5,'#4e6f33');base.addColorStop(1,'#39521f');g.fillStyle=base;g.fillRect(0,0,w,h);
    for(let i=0;i<220;i++){const x=R()*w,y=R()*h,rr=40+R()*160;g.fillStyle=R()<0.5?'rgba(34,52,22,0.07)':'rgba(122,152,74,0.06)';g.beginPath();g.ellipse(x,y,rr,rr*0.82,0,0,7);g.fill();}
    for(let i=0;i<62000;i++){const x=R()*w,y=R()*h,l=R();g.fillStyle=l<0.5?`rgba(38,56,24,${0.05+R()*0.13})`:`rgba(128,160,78,${0.04+R()*0.14})`;const s=0.8+R()*2.4;g.fillRect(x,y,s,s*0.6);}
    for(let i=0;i<320;i++){const x=R()*w,y=R()*h;g.fillStyle=['#e8d24a','#e3e9ee','#d98ac0','#f0c24a'][(R()*4)|0];g.beginPath();g.arc(x,y,1+R()*1.3,0,7);g.fill();}
  }
  // camp dirt clearing (matches the buildable zone)
  const cx=w/2,cy=h/2,cr=(BZONE+6)/GW*w;
  const dg=g.createRadialGradient(cx,cy,cr*0.35,cx,cy,cr);
  dg.addColorStop(0,'rgba(126,96,60,0.9)');dg.addColorStop(0.72,'rgba(112,86,54,0.5)');dg.addColorStop(1,'rgba(112,86,54,0)');
  g.fillStyle=dg;g.beginPath();g.ellipse(cx,cy,cr,cr,0,0,7);g.fill();
  for(let i=0;i<11000;i++){const a=R()*6.283,d=Math.sqrt(R())*cr;const x=cx+Math.cos(a)*d,y=cy+Math.sin(a)*d;g.fillStyle=`rgba(70,52,32,${0.05+R()*0.16})`;const s=0.8+R()*2.3;g.fillRect(x,y,s,s);}
  groundApplied=!!img;
}
bakeGround();
function drawGround(){
  if(!groundApplied){const gi=spr('ground');if(gi)bakeGround(gi);} // auto-upgrade to a dropped-in grass texture
  const x0=sx(-GW/2), y0=sy(-GH/2), wpx=GW*sc(), hpx=GH*sc()*TILT;
  ctx.drawImage(terr,0,0,terr.width,terr.height,x0,y0,wpx,hpx);
}

//================================================================
//  ART  (procedural billboards; replaced by sprites when present)
//================================================================
function shadow(wx,wy,rw,a){const x=sx(wx),y=sy(wy),s=sc();ctx.fillStyle=`rgba(8,16,8,${a})`;ctx.beginPath();ctx.ellipse(x,y,rw*s,rw*s*TILT*0.55,0,0,7);ctx.fill();}
function drawPine(o,t){const s=sc(),x=sx(o.x),gy=sy(o.y),R=o.r*s;shadow(o.x,o.y,o.r*0.9,0.30);const sway=Math.sin(t*0.8+o.seed)*R*0.05,th=R*0.55;
  const tg=ctx.createLinearGradient(x-R*0.12,0,x+R*0.12,0);tg.addColorStop(0,'#3a2a18');tg.addColorStop(.5,'#6b4a2b');tg.addColorStop(1,'#2e2012');ctx.fillStyle=tg;ctx.fillRect(x-R*0.1,gy-th,R*0.2,th);
  for(let i=0;i<4;i++){const ly=gy-th-i*(R*0.62),lw=R*(1.15-i*0.2),lh=R*0.95,cx=x+sway*(i+1)/4;const gd=ctx.createLinearGradient(cx-lw,ly-lh,cx+lw,ly);gd.addColorStop(0,'#3f7a3a');gd.addColorStop(.5,'#2f5e2c');gd.addColorStop(1,'#1d3d1c');ctx.fillStyle=gd;ctx.beginPath();ctx.moveTo(cx,ly-lh);ctx.lineTo(cx-lw,ly+lh*0.25);ctx.quadraticCurveTo(cx,ly+lh*0.05,cx+lw,ly+lh*0.25);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(150,200,120,0.16)';ctx.beginPath();ctx.moveTo(cx,ly-lh);ctx.lineTo(cx-lw*0.5,ly-lh*0.2);ctx.lineTo(cx-lw*0.1,ly-lh*0.3);ctx.closePath();ctx.fill();}}
function drawOak(o,t){const s=sc(),x=sx(o.x),gy=sy(o.y),R=o.r*s;shadow(o.x,o.y,o.r,0.30);const sway=Math.sin(t*0.7+o.seed)*R*0.04,th=R*0.9;
  const tg=ctx.createLinearGradient(x-R*0.16,0,x+R*0.16,0);tg.addColorStop(0,'#3a2a18');tg.addColorStop(.5,'#705235');tg.addColorStop(1,'#2e2012');ctx.fillStyle=tg;ctx.fillRect(x-R*0.14,gy-th,R*0.28,th);
  const cy=gy-th-R*1.0,bl=[[0,-R,R*1.25],[-R*0.8,-R*0.6,R*0.95],[R*0.8,-R*0.6,R*0.95],[-R*0.4,-R*1.4,R*0.85],[R*0.4,-R*1.4,R*0.85]];
  for(const b of bl){ctx.fillStyle='#1c3a1b';ctx.beginPath();ctx.ellipse(x+b[0]+sway,cy+b[1],b[2]*1.02,b[2]*0.92,0,0,7);ctx.fill();}

function drawBush(o){const s=sc(),x=sx(o.x),gy=sy(o.y),R=o.r*s;shadow(o.x,o.y,o.r,0.26);const bl=[[0,0,R],[-R*0.7,R*0.1,R*0.7],[R*0.7,R*0.05,R*0.7]];for(const b of bl){ctx.fillStyle='#1d3c1c';ctx.beginPath();ctx.ellipse(x+b[0],gy-R*0.5+b[1],b[2],b[2]*0.85,0,0,7);ctx.fill();}for(const b of bl){const gd=ctx.createRadialGradient(x+b[0]-b[2]*0.4,gy-R*0.8+b[1],1,x+b[0],gy-R*0.5+b[1],b[2]);gd.addColorStop(0,'#4f8a3c');gd.addColorStop(1,'#2c5526');ctx.fillStyle=gd;ctx.beginPath();ctx.ellipse(x+b[0],gy-R*0.5+b[1],b[2]*0.9,b[2]*0.72,0,0,7);ctx.fill();}}
function drawStone(o){const s=sc(),x=sx(o.x),gy=sy(o.y),R=o.r*s;shadow(o.x,o.y,o.r,0.28);const gd=ctx.createLinearGradient(x-R,gy-R*1.2,x+R,gy);gd.addColorStop(0,'#9aa2a8');gd.addColorStop(.5,'#6f777d');gd.addColorStop(1,'#454b50');ctx.fillStyle=gd;ctx.beginPath();ctx.moveTo(x-R,gy);ctx.lineTo(x-R*0.7,gy-R*0.9);ctx.lineTo(x,gy-R*1.1);ctx.lineTo(x+R*0.7,gy-R*0.85);ctx.lineTo(x+R,gy);ctx.closePath();ctx.fill();}
function drawRocks(o){const s=sc(),x=sx(o.x),gy=sy(o.y),R=o.r*s;shadow(o.x,o.y,o.r*1.2,0.30);const p=[[0,0,R],[-R*0.8,R*0.1,R*0.7],[R*0.8,R*0.15,R*0.65],[-R*0.2,-R*0.5,R*0.6]];for(const q of p){const gd=ctx.createLinearGradient(x+q[0]-q[2],gy+q[1]-q[2]*1.1,x+q[0]+q[2],gy+q[1]);gd.addColorStop(0,'#a7adb2');gd.addColorStop(.5,'#71787e');gd.addColorStop(1,'#3f454a');ctx.fillStyle=gd;ctx.beginPath();const bx=x+q[0],by=gy+q[1];ctx.moveTo(bx-q[2],by);ctx.lineTo(bx-q[2]*0.6,by-q[2]);ctx.lineTo(bx+q[2]*0.1,by-q[2]*1.15);ctx.lineTo(bx+q[2]*0.7,by-q[2]*0.85);ctx.lineTo(bx+q[2],by);ctx.closePath();ctx.fill();}}
// ---- hearth (the campfire core) ----
const embers=[];for(let i=0;i<28;i++)embers.push({a:rng()*6.283,d:rng()*1.2,h:rng()*2,sp:0.5+rng(),sz:rng()});
function drawHearthBase(){const o={x:0,y:0,r:2.0},s=sc(),x=sx(0),gy=sy(0),R=o.r*s;shadow(0,0,o.r*1.3,0.34);
  // raised stone platform
  const pg=ctx.createLinearGradient(x-R*1.4,gy-R*0.5,x+R*1.4,gy+R*0.4);pg.addColorStop(0,'#8b9095');pg.addColorStop(1,'#4a4f54');ctx.fillStyle=pg;ctx.beginPath();ctx.ellipse(x,gy,R*1.5,R*1.5*TILT,0,0,7);ctx.fill();
  // stone ring
  for(let i=0;i<10;i++){const a=i/10*6.283,rx=x+Math.cos(a)*R,ry=gy+Math.sin(a)*R*TILT;const g=ctx.createLinearGradient(rx-R*0.25,ry-R*0.25,rx+R*0.25,ry+R*0.25);g.addColorStop(0,'#9aa0a4');g.addColorStop(1,'#4d5256');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(rx,ry,R*0.24,R*0.18,0,0,7);ctx.fill();}
  ctx.strokeStyle='#5a3a1e';ctx.lineWidth=R*0.22;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x-R*0.5,gy+R*0.1);ctx.lineTo(x+R*0.5,gy-R*0.1);ctx.moveTo(x-R*0.4,gy-R*0.15);ctx.lineTo(x+R*0.45,gy+R*0.15);ctx.stroke();
}
function drawHearthFlame(t){const o={x:0,y:0,r:2.0},s=sc(),x=sx(0),gy=sy(0)-o.r*s*0.1,R=o.r*s;
  ctx.save();ctx.globalCompositeOperation='lighter';const fk=0.85+0.15*Math.sin(t*12)+0.08*Math.sin(t*27);
  const gl=ctx.createRadialGradient(x,gy-R*0.5,0,x,gy-R*0.5,R*5*fk),gA=(0.3+NIGHT*0.6)*fk;gl.addColorStop(0,`rgba(255,175,75,${gA})`);gl.addColorStop(.4,`rgba(255,120,40,${gA*0.4})`);gl.addColorStop(1,'rgba(255,90,30,0)');ctx.fillStyle=gl;ctx.beginPath();ctx.arc(x,gy-R*0.5,R*5*fk,0,7);ctx.fill();
  function fl(c,h,wd,off){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x-wd,gy);ctx.quadraticCurveTo(x-wd*0.7,gy-h*0.5,x+Math.sin(t*9+off)*wd*0.5,gy-h);ctx.quadraticCurveTo(x+wd*0.7,gy-h*0.5,x+wd,gy);ctx.quadraticCurveTo(x,gy+R*0.1,x-wd,gy);ctx.fill();}
  fl('rgba(220,60,20,0.9)',R*2.3*fk,R*0.85,0);fl('rgba(255,140,30,0.95)',R*1.7*fk,R*0.6,1.4);fl('rgba(255,225,120,0.95)',R*1.0*fk,R*0.32,2.8);
  for(const e of embers){e.h+=e.sp*0.03;if(e.h>2.4){e.h=0;e.a=rng()*6.283;e.d=rng()*0.8;}const ex=x+Math.cos(e.a)*e.d*R*0.5+Math.sin((t+e.a)*2)*R*0.1,ey=gy-e.h*R;ctx.globalAlpha=Math.max(0,1-e.h/2.4)*0.9;ctx.fillStyle=e.sz<0.5?'#ffd06a':'#ff8a3a';ctx.beginPath();ctx.arc(ex,ey,R*0.06*(0.6+e.sz),0,7);ctx.fill();}
  ctx.globalAlpha=1;ctx.restore();
}
// ---- buildings ----
function bShade(b){return b.hp<b.max?Math.max(0,b.hp/b.max):1;}
function dmgTint(b,x,gy,R){if(b.hp<b.max){ctx.fillStyle=`rgba(120,20,10,${0.35*(1-b.hp/b.max)})`;ctx.beginPath();ctx.ellipse(x,gy-R,R,R*1.4,0,0,7);ctx.fill();}}
function drawHouse(b,t){const s=sc(),x=sx(b.x),gy=sy(b.y),R=1.9*s;shadow(b.x,b.y,2.0,0.32);
  const wW=R*2.0,wH=R*1.5,rH=R*1.15,lx=x-wW/2,ty=gy-wH;
  const wg=ctx.createLinearGradient(lx,0,lx+wW,0);wg.addColorStop(0,'#6b4a2b');wg.addColorStop(.5,'#8a6238');wg.addColorStop(1,'#553b22');ctx.fillStyle=wg;ctx.fillRect(lx,ty,wW,wH);
  ctx.strokeStyle='rgba(40,26,14,0.4)';ctx.lineWidth=Math.max(1,R*0.05);for(let i=1;i<5;i++){const yy=ty+wH*i/5;ctx.beginPath();ctx.moveTo(lx,yy);ctx.lineTo(lx+wW,yy);ctx.stroke();}
  ctx.fillStyle='#3a2614';ctx.fillRect(x-R*0.32,gy-R*0.9,R*0.64,R*0.9);
  const lit=NIGHT>0.35;ctx.fillStyle=lit?'#ffd277':'#243018';ctx.fillRect(x+R*0.5,gy-R*1.1,R*0.45,R*0.45);
  if(lit){ctx.save();ctx.globalAlpha=0.35+0.18*Math.sin(t*5);ctx.fillStyle='#ffcf6a';ctx.fillRect(x+R*0.44,gy-R*1.16,R*0.57,R*0.57);ctx.restore();}
  const rg=ctx.createLinearGradient(x,ty-rH,x,ty);rg.addColorStop(0,'#7a4030');rg.addColorStop(1,'#52281c');ctx.fillStyle=rg;ctx.beginPath();ctx.moveTo(x,ty-rH);ctx.lineTo(lx-R*0.3,ty);ctx.lineTo(lx+wW+R*0.3,ty);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,240,220,0.12)';ctx.beginPath();ctx.moveTo(x,ty-rH);ctx.lineTo(lx-R*0.3,ty);ctx.lineTo(lx+wW*0.2,ty);ctx.closePath();ctx.fill();
  dmgTint(b,x,gy,R);}
function drawWall(b){const s=sc(),x=sx(b.x),gy=sy(b.y),R=1.9*s;shadow(b.x,b.y,1.8,0.3);
  const wW=R*1.9,wH=R*1.25,lx=x-wW/2,ty=gy-wH;
  // stacked logs vertical palisade
  const n=5;for(let i=0;i<n;i++){const px=lx+wW*i/n,pw=wW/n;const g=ctx.createLinearGradient(px,0,px+pw,0);g.addColorStop(0,'#5e4327');g.addColorStop(.5,'#7d5a33');g.addColorStop(1,'#4a3420');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(px,ty+R*0.2);ctx.lineTo(px,gy);ctx.lineTo(px+pw,gy);ctx.lineTo(px+pw,ty+R*0.2);ctx.arc(px+pw/2,ty+R*0.2,pw/2,0,Math.PI,true);ctx.fill();ctx.fillStyle='rgba(255,230,180,0.12)';ctx.beginPath();ctx.arc(px+pw/2,ty+R*0.2,pw*0.32,0,7);ctx.fill();}
  ctx.strokeStyle='rgba(40,26,14,0.5)';ctx.lineWidth=Math.max(1,R*0.08);ctx.beginPath();ctx.moveTo(lx,gy-wH*0.5);ctx.lineTo(lx+wW,gy-wH*0.5);ctx.stroke();
  dmgTint(b,x,gy,R);}
function drawArrow(b,t){const s=sc(),x=sx(b.x),gy=sy(b.y),R=1.9*s;shadow(b.x,b.y,1.7,0.3);
  // wooden legs
  ctx.strokeStyle='#5a3f24';ctx.lineWidth=R*0.16;ctx.beginPath();ctx.moveTo(x-R*0.5,gy);ctx.lineTo(x-R*0.28,gy-R*1.5);ctx.moveTo(x+R*0.5,gy);ctx.lineTo(x+R*0.28,gy-R*1.5);ctx.stroke();
  // platform
  ctx.fillStyle='#6b4a2b';ctx.fillRect(x-R*0.6,gy-R*1.75,R*1.2,R*0.28);
  // roof
  const rg=ctx.createLinearGradient(x,gy-R*2.7,x,gy-R*1.7);rg.addColorStop(0,'#8a4a36');rg.addColorStop(1,'#52281c');ctx.fillStyle=rg;ctx.beginPath();ctx.moveTo(x,gy-R*2.7);ctx.lineTo(x-R*0.72,gy-R*1.75);ctx.lineTo(x+R*0.72,gy-R*1.75);ctx.closePath();ctx.fill();
  // archer hint (dark)
  ctx.fillStyle='#2e3a30';ctx.beginPath();ctx.arc(x,gy-R*1.95,R*0.2,0,7);ctx.fill();

function drawCannon(b){const s=sc(),x=sx(b.x),gy=sy(b.y),R=1.9*s;shadow(b.x,b.y,1.8,0.32);
  const g=ctx.createLinearGradient(x-R,gy-R*1.3,x+R,gy);g.addColorStop(0,'#7d848a');g.addColorStop(.5,'#565c61');g.addColorStop(1,'#34383c');ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(x-R*0.9,gy);ctx.lineTo(x-R*0.7,gy-R*1.1);ctx.lineTo(x+R*0.7,gy-R*1.1);ctx.lineTo(x+R*0.9,gy);ctx.closePath();ctx.fill();
  // barrel
  ctx.save();ctx.translate(x,gy-R*1.1);ctx.rotate(-0.5);ctx.fillStyle='#23262a';ctx.fillRect(0,-R*0.22,R*1.2,R*0.44);ctx.fillStyle='#3a3e44';ctx.fillRect(R*1.0,-R*0.26,R*0.18,R*0.52);ctx.restore();
  dmgTint(b,x,gy,R);}
function drawFarm(b){const s=sc(),x=sx(b.x),gy=sy(b.y),R=1.9*s;shadow(b.x,b.y,1.9,0.26);
  // tilled plot
  ctx.fillStyle='#6e4a2a';ctx.beginPath();ctx.ellipse(x,gy-R*0.2,R*1.3,R*1.3*TILT,0,0,7);ctx.fill();
  ctx.strokeStyle='rgba(40,26,14,0.4)';ctx.lineWidth=R*0.06;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(x-R*1.1,gy-R*0.2+i*R*0.28*TILT);ctx.lineTo(x+R*1.1,gy-R*0.2+i*R*0.28*TILT);ctx.stroke();}
  // crops
  for(let i=0;i<11;i++){const cx=x-R*0.9+rng()*R*1.8,cy=gy-R*0.2+(rng()-0.5)*R*0.7*TILT;ctx.fillStyle='#7fb04a';ctx.fillRect(cx,cy-R*0.4,R*0.07,R*0.4);ctx.fillStyle='#e8c84a';ctx.beginPath();ctx.arc(cx+R*0.03,cy-R*0.42,R*0.07,0,7);ctx.fill();}
  dmgTint(b,x,gy,R);}
const BDRAW={house:drawHouse,wall:drawWall,arrow:drawArrow,cannon:drawCannon,farm:drawFarm};
const BH={house:9.5,wall:5,arrow:11,cannon:7.5,farm:5.5}; // sprite billboard heights (world units)
// ---- villager ----
function drawVillager(v,t){const s=sc(),x=sx(v.x),gy=sy(v.y),R=0.9*s;shadow(v.x,v.y,0.55,0.3);
  if(v===selVill){ctx.strokeStyle='rgba(255,225,120,0.9)';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.beginPath();ctx.ellipse(x,gy,R*1.1,R*1.1*TILT,0,0,7);ctx.stroke();ctx.setLineDash([]);}
  const mv=v.state!=='idle'&&(v.vx||v.vy),bob=mv?Math.abs(Math.sin(t*11+v.wob))*R*0.18:Math.sin(t*3+v.wob)*R*0.05,by=gy-bob;
  ctx.fillStyle='#2e3640';ctx.fillRect(x-R*0.3,by-R*0.8,R*0.22,R*0.8);ctx.fillRect(x+R*0.08,by-R*0.8,R*0.22,R*0.8);
  const bg=ctx.createLinearGradient(x-R*0.4,0,x+R*0.4,0);bg.addColorStop(0,'#3f5a48');bg.addColorStop(.5,'#557a5e');bg.addColorStop(1,'#2e4034');ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(x-R*0.38,by-R*0.75);ctx.quadraticCurveTo(x-R*0.46,by-R*1.5,x-R*0.26,by-R*1.7);ctx.lineTo(x+R*0.26,by-R*1.7);ctx.quadraticCurveTo(x+R*0.46,by-R*1.5,x+R*0.38,by-R*0.75);ctx.closePath();ctx.fill();
  if(v.carry>0){ctx.fillStyle=v.node&&v.node.kind==='stone'?'#8b9095':'#6b4a2b';ctx.fillRect(x-R*0.55,by-R*1.5,R*0.32,R*0.5);}
  ctx.fillStyle='#caa178';ctx.beginPath();ctx.arc(x,by-R*1.95,R*0.28,0,7);ctx.fill();
  ctx.fillStyle='#7a5230';ctx.beginPath();ctx.arc(x,by-R*2.06,R*0.3,Math.PI,0);ctx.fill();}
// ---- enemy ----
function drawEnemy(e,t){const s=sc(),x=sx(e.x),gy=sy(e.y),R=e.r*s;shadow(e.x,e.y,e.r*0.7,0.34);
  const bob=Math.abs(Math.sin(t*9+e.wob))*R*0.16,by=gy-bob;
  if(e.boss){// bigger brute
    ctx.fillStyle='#3a1d24';ctx.beginPath();ctx.ellipse(x,by-R*0.9,R*0.95,R*1.1,0,0,7);ctx.fill();
    const g=ctx.createLinearGradient(x-R,by-R*1.6,x+R,by);g.addColorStop(0,'#7a2230');g.addColorStop(1,'#3a1018');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,by-R*0.95,R*0.8,R*1.0,0,0,7);ctx.fill();
    ctx.fillStyle='#caa178';ctx.beginPath();ctx.arc(x,by-R*1.9,R*0.42,0,7);ctx.fill();
    ctx.fillStyle='#ffd24a';ctx.beginPath();ctx.arc(x-R*0.16,by-R*1.95,R*0.07,0,7);ctx.arc(x+R*0.16,by-R*1.95,R*0.07,0,7);ctx.fill();
  } else {
    const g=ctx.createLinearGradient(x-R*0.5,0,x+R*0.5,0);g.addColorStop(0,'#46243a');g.addColorStop(.5,'#6a3550');g.addColorStop(1,'#2e1726');ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(x-R*0.4,by-R*0.7);ctx.quadraticCurveTo(x-R*0.5,by-R*1.5,x-R*0.26,by-R*1.7);ctx.lineTo(x+R*0.26,by-R*1.7);ctx.quadraticCurveTo(x+R*0.5,by-R*1.5,x+R*0.4,by-R*0.7);ctx.closePath();ctx.fill();
    ctx.fillStyle='#262630';ctx.fillRect(x-R*0.28,by-R*0.78,R*0.2,R*0.78);ctx.fillRect(x+R*0.08,by-R*0.78,R*0.2,R*0.78);
    ctx.fillStyle='#9c8466';ctx.beginPath();ctx.arc(x,by-R*1.92,R*0.27,0,7);ctx.fill();
    ctx.fillStyle='#ff5a4a';ctx.beginPath();ctx.arc(x-R*0.1,by-R*1.96,R*0.06,0,7);ctx.arc(x+R*0.1,by-R*1.96,R*0.06,0,7);ctx.fill();
  }
  // hp pip
  if(e.hp<e.max){const bw=R*1.2;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(x-bw/2,by-R*2.5,bw,R*0.14);ctx.fillStyle='#ff5a4a';ctx.fillRect(x-bw/2,by-R*2.5,bw*(e.hp/e.max),R*0.14);}}

function drawSpriteBillboard(name,o,hgtUnits){const im=spr(name);if(!im)return false;const s=sc(),x=sx(o.x),gy=sy(o.y);const hpx=hgtUnits*s,wpx=hpx*(im.width/im.height);shadow(o.x,o.y,hgtUnits*0.28,0.3);ctx.drawImage(im,x-wpx/2,gy-hpx,wpx,hpx);return true;}

let NIGHT=0, timePhase=0;
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerpColor(a,b,t){const p=hx(a),q=hx(b);return `rgb(${p[0]+(q[0]-p[0])*t|0},${p[1]+(q[1]-p[1])*t|0},${p[2]+(q[2]-p[2])*t|0})`;}
function skyColor(){return timePhase<0.5?lerpColor('#9ec6e8','#caa15f',timePhase/0.5):lerpColor('#caa15f','#0d1626',(timePhase-0.5)/0.5);}
function lightingOverlay(){NIGHT=Math.max(0,(timePhase-0.45)/0.55);if(timePhase<0.04)return;ctx.save();if(timePhase<0.5){ctx.globalCompositeOperation='multiply';ctx.fillStyle=lerpColor('#ffffff','#edbf86',timePhase/0.5*0.85);ctx.fillRect(0,0,W,H);}else{const k=(timePhase-0.5)/0.5;ctx.globalCompositeOperation='multiply';ctx.fillStyle=lerpColor('#edbf86','#7e8ec2',k);ctx.fillRect(0,0,W,H);ctx.globalCompositeOperation='source-over';ctx.fillStyle=`rgba(18,26,52,${0.16*k})`;ctx.fillRect(0,0,W,H);}ctx.restore();}
function glow(wx,wy,rw,col){const x=sx(wx),y=sy(wy),r=rw*sc();const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();}
function drawNightLights(){if(NIGHT<=0.02)return;ctx.save();ctx.globalCompositeOperation='lighter';
  glow(0,0,26,`rgba(255,165,80,${0.55*NIGHT})`);            // hearth warm pool
  for(const b of builds){if(b.key==='house')glow(b.x,b.y,11,`rgba(255,205,120,${0.4*NIGHT})`);else if(b.range)glow(b.x,b.y,9,`rgba(150,205,255,${0.26*NIGHT})`);else if(b.key==='farm')glow(b.x,b.y,8,`rgba(180,220,255,${0.16*NIGHT})`);}
  ctx.restore();}
function vignette(){const g=ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.3,W/2,H*0.5,Math.max(W,H)*0.75);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${0.26+NIGHT*0.32})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
let timeAnim=null;
function animateTime(target){timeAnim={from:timePhase,target,t0:performance.now()};}

//  GAMEPLAY

function canAfford(c){return Object.keys(c).every(k=>G.res[k]>=c[k]);}
function pay(c){for(const k in c)G.res[k]-=c[k];}
function costStr(c){return Object.keys(c).map(k=>({wood:'🪵',stone:'🪨',food:'🍖',gold:'🪙'}[k]+c[k])).join(' ');}

function placeBuild(key,tx,ty){
  const d=CAT[key];
  if(tx===HC&&ty===HC)return toast('That’s the Hearth',true);
  if(!inZone(tx,ty))return toast('Build inside the camp',true);
  if(!placeable(tx,ty))return toast('Tile is taken',true);
  if(!canAfford(d.cost))return toast('Not enough resources',true);
  pay(d.cost);
  const b=add(builds,{key,type:key,x:tileWX(tx),y:tileWY(ty),tx,ty,hp:d.hp,max:d.hp,block:true,cd:0,...d});
  cellB[ty*GN+tx]=b;
  if(d.node){const n=add(nodes,{kind:'food',x:b.x,y:b.y,tx,ty,workers:0,farm:true});cellN[ty*GN+tx]=n;}
  if(d.pop){G.popCap+=d.pop;for(let i=0;i<d.pop;i++)spawnVillager();}
  computeFlow();
  toast(d.name+' built');
  fxBurst(b.x,b.y,'#8fe0a0');
  if(!canAfford(CAT[G.sel||key].cost)) clearSel();
  syncBuildBar();
}
function clearSel(){G.sel=null;document.getElementById('cancel').style.display='none';syncBuildBar();}

// villager AI
function nearestIdleVillager(x,y){let best=null,bd=1e9;for(const v of villagers){if(v.state!=='idle')continue;const d=(v.x-x)**2+(v.y-y)**2;if(d<bd){bd=d;best=v;}}return best;}
function assignToNode(n){
  const v=nearestIdleVillager(n.x,n.y);
  if(!v)return toast('No idle villagers',true);
  v.node=n;v.state='toNode';n.workers++;toast('Villager → '+n.kind);
}
function moveTo(o,tx,ty,sp,dt){const dx=tx-o.x,dy=ty-o.y,d=Math.hypot(dx,dy);o.vx=0;o.vy=0;if(d<0.4)return true;o.vx=dx/d;o.vy=dy/d;o.x+=o.vx*sp*dt;o.y+=o.vy*sp*dt;return false;}
function updateVillagers(dt,t){
  for(const v of villagers){
    if(G.phase==='night'){ // retreat to hearth, huddle
      const a=v.wob*7, rx=Math.cos(a)*3.2, ry=6+Math.sin(a)*2.6;
      moveTo(v,rx,ry,9,dt); continue;
    }
    if(v.state==='idle'){const a=v.wob+t*0.3,rx=Math.cos(a)*3.5,ry=6+Math.sin(a)*2.5;moveTo(v,rx,ry,2.5,dt);continue;}
    const n=v.node;
    if(!n){v.state='idle';continue;}
    if(v.state==='toNode'){if(moveTo(v,n.x,n.y-2,11,dt)){v.state='gather';v.t=0;}}
    else if(v.state==='gather'){v.t+=dt;v.vx=0;if(v.t>1.4){v.carry=6;v.state='toHearth';}}
    else if(v.state==='toHearth'){if(moveTo(v,0,5,11,dt)){G.res[n.kind]+=v.carry;fxText(0,4,'+'+v.carry+({wood:'🪵',stone:'🪨',food:'🍖'}[n.kind]||''),'#bfe6c4');v.carry=0;v.state='toNode';}}
  }
}

// ---- night / horde ----
const night={active:false,toSpawn:0,spawned:0,spawnT:0,boss:false};
function beginNight(){
  if(G.phase==='night'||G.over)return;
  G.phase='night';animateTime(0.95);
  night.active=true;night.spawned=0;night.spawnT=0;
  night.boss=G.day%5===0;
  night.toSpawn=6+G.day*3;
  computeFlow();
  banner('NIGHT '+G.day,'the horde comes');
  syncBuildBar();
}
function spawnEnemy(){
  // pick a random edge tile that has a path
  let tx,ty,tries=0;
  do{const side=(rng()*4)|0;if(side===0){tx=1;ty=1+(rng()*(GN-2))|0;}else if(side===1){tx=GN-2;ty=1+(rng()*(GN-2))|0;}else if(side===2){ty=1;tx=1+(rng()*(GN-2))|0;}else{ty=GN-2;tx=1+(rng()*(GN-2))|0;}tries++;}while(occupied(tx,ty)&&tries<20);
  const lvl=G.day, boss=night.boss&&night.spawned===night.toSpawn-1;
  const hp=boss?260+lvl*60:24+lvl*9;
  add(enemies,{x:tileWX(tx),y:tileWY(ty),hp,max:hp,r:boss?2.0:1.0,sp:boss?5.5:7.5+rng()*1.5,
    dmg:boss?60:14,atkCd:0,wob:rng()*6.28,gold:boss?40:3+((lvl/2)|0),boss});
}
function enemyStep(e,dt){
  const ti=worldToTile(e.x,e.y);let dirx=0,diry=0;
  if(inGrid(ti.tx,ti.ty)&&flow[ti.ty*GN+ti.tx]<1e9){
    // follow gradient to lowest neighbor
    let best=flow[ti.ty*GN+ti.tx],bx=0,by=0;
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){if(!dx&&!dy)continue;const nx=ti.tx+dx,ny=ti.ty+dy;if(!inGrid(nx,ny))continue;const f=flow[ny*GN+nx];if(f<best){best=f;bx=dx;by=dy;}}
    dirx=bx;diry=by;
  } else {dirx=-e.x;diry=-e.y;}
  const dl=Math.hypot(dirx,diry)||1;dirx/=dl;diry/=dl;
  // next position; if stepping into a building, attack it
  const nx=e.x+dirx*e.sp*dt, ny=e.y+diry*e.sp*dt;
  const nt=worldToTile(nx,ny);
  const hb=inGrid(nt.tx,nt.ty)?cellB[nt.ty*GN+nt.tx]:null;
  const distH=Math.hypot(e.x,e.y);
  if(distH<5){ // attack hearth
    e.atkCd-=dt;if(e.atkCd<=0){e.atkCd=0.8;G.hearthHP-=e.dmg;fxText(0,0,'-'+e.dmg,'#ff7a6a');shake(4);if(G.hearthHP<=0)gameOver();}
    return;
  }
  if(hb&&hb.block){e.atkCd-=dt;if(e.atkCd<=0){e.atkCd=0.7;damageBuild(hb,e.dmg);}return;}
  e.x=nx;e.y=ny;
}
function damageBuild(b,d){b.hp-=d;fxBurst(b.x,b.y,'#ffcaa0');if(b.hp<=0)destroyBuild(b);}
function destroyBuild(b){const i=builds.indexOf(b);if(i>=0)builds.splice(i,1);if(cellB[b.ty*GN+b.tx]===b)cellB[b.ty*GN+b.tx]=null;if(b.node){const ni=nodes.findIndex(n=>n.tx===b.tx&&n.ty===b.ty);if(ni>=0){cellN[b.ty*GN+b.tx]=null;nodes.splice(ni,1);}}computeFlow();fxBurst(b.x,b.y,'#888');}
function killEnemy(e){const i=enemies.indexOf(e);if(i>=0)enemies.splice(i,1);G.res.gold+=e.gold;fxText(e.x,e.y,'+'+e.gold+'🪙','#ffd86a');fxBurst(e.x,e.y,'#ff8a6a');}

// towers
function updateTowers(dt,t){
  if(G.phase!=='night')return;
  for(const b of builds){
    if(!b.range)continue;b.cd-=dt;if(b.cd>0)continue;
    let tgt=null,bd=b.range*b.range;
    for(const e of enemies){const d=(e.x-b.x)**2+(e.y-b.y)**2;if(d<bd){bd=d;tgt=e;}}
    if(tgt){b.cd=b.rate;add(shots,{x:b.x,y:b.y-3,tx:tgt.x,ty:tgt.y,tgt,dmg:b.dmg,aoe:b.aoe||0,cannon:!!b.aoe,life:1.2});fxMuzzle(b.x,b.y-3);}
  }
}
function updateShots(dt){
  for(let i=shots.length-1;i>=0;i--){const s=shots[i];const ex=s.tgt&&enemies.includes(s.tgt)?s.tgt.x:s.tx,ey=s.tgt&&enemies.includes(s.tgt)?s.tgt.y:s.ty;
    const dx=ex-s.x,dy=ey-s.y,d=Math.hypot(dx,dy);const sp=(s.cannon?34:54);s.life-=dt;
    if(d<1.4||s.life<=0){
      if(s.aoe){for(const e of enemies){if((e.x-ex)**2+(e.y-ey)**2<s.aoe*s.aoe){e.hp-=s.dmg;if(e.hp<=0)killEnemy(e);}}fxBurst(ex,ey,'#ffd0a0');}
      else if(s.tgt&&enemies.includes(s.tgt)){s.tgt.hp-=s.dmg;if(s.tgt.hp<=0)killEnemy(s.tgt);else fxBurst(ex,ey,'#fff');}
      shots.splice(i,1);continue;
    }
    s.x+=dx/d*sp*dt;s.y+=dy/d*sp*dt;
  }
}
function checkNightEnd(){
  if(G.phase!=='night'||!night.active)return;
  if(night.spawned>=night.toSpawn && enemies.length===0){
    night.active=false;G.phase='day';animateTime(0.0);
    const reward=20+G.day*8;G.res.gold+=reward;G.day++;
    banner('DAWN','held night '+(G.day-1)+'  ·  +'+reward+'🪙');
    // heal hearth a bit, regen walls slightly
    G.hearthHP=Math.min(G.hearthMax,G.hearthHP+120);
    syncBuildBar();
  }
}
let bestNight=parseInt(localStorage.getItem('hh_best')||'0');
function gameOver(){if(G.over)return;G.over=true;G.phase='day';night.active=false;
  const held=G.day-1>0?G.day-1:0;if(held>bestNight){bestNight=held;localStorage.setItem('hh_best',held);}
  document.getElementById('overText').textContent='You held '+held+' night'+(held===1?'':'s')+'.   Best: '+bestNight;
  document.getElementById('over').style.display='flex';
}
function restart(){location.reload();}

function fxText(wx,wy,txt,col){fx.push({k:'t',x:wx,y:wy,txt,col,life:1.1,vy:-14});}
function fxBurst(wx,wy,col){for(let i=0;i<7;i++){const a=rng()*6.28,sp=6+rng()*10;fx.push({k:'p',x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col,life:0.5+rng()*0.3});}}
function fxMuzzle(wx,wy){fx.push({k:'m',x:wx,y:wy,life:0.12});}
function updateFx(dt){for(let i=fx.length-1;i>=0;i--){const f=fx[i];f.life-=dt;if(f.life<=0){fx.splice(i,1);continue;}if(f.k==='t')f.y+=f.vy*dt*0.06;if(f.k==='p'){f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=20*dt;}}}
function drawFx(){for(const f of fx){const x=sx(f.x),y=sy(f.y);if(f.k==='t'){ctx.globalAlpha=Math.min(1,f.life);ctx.font='900 '+(13*Math.min(1.4,sc()/6+0.6))+'px system-ui';ctx.fillStyle=f.col;ctx.textAlign='center';ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=3;ctx.strokeText(f.txt,x,y);ctx.fillText(f.txt,x,y);ctx.globalAlpha=1;}else if(f.k==='p'){ctx.globalAlpha=Math.min(1,f.life*2);ctx.fillStyle=f.col;ctx.beginPath();ctx.arc(x,y,2.2*sc()/6+1,0,7);ctx.fill();ctx.globalAlpha=1;}else if(f.k==='m'){ctx.globalAlpha=f.life/0.12;ctx.fillStyle='#ffe6a0';ctx.beginPath();ctx.arc(x,y,3*sc()/4,0,7);ctx.fill();ctx.globalAlpha=1;}}ctx.textAlign='left';}
let shakeAmt=0;function shake(a){shakeAmt=Math.min(8,shakeAmt+a);}

//================================================================
//  RENDER
//================================================================
function drawNode(n,t){
  // marker banner floating above
  const x=sx(n.x),gy=sy(n.y),s=sc();
  const ic=n.kind==='wood'?'🪵':n.kind==='stone'?'🪨':'🌾';
  const py=gy-(n.farm?2.6:6.0)*s - Math.sin(t*2+n.x)*2;
  ctx.save();ctx.globalAlpha=0.92;
  ctx.fillStyle='rgba(10,14,16,0.7)';roundRect(x-13,py-13,26,22,6);ctx.fill();
  ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText(ic,x,py+2);
  if(n.workers>0){ctx.fillStyle='#bfe6c4';ctx.font='900 9px system-ui';ctx.fillText('👤'+n.workers,x,py+12);}
  ctx.restore();ctx.textAlign='left';
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawScenery(o,t){if(o.type==='pine')drawPine(o,t);else if(o.type==='oak')drawOak(o,t);else if(o.type==='bush')drawBush(o);else if(o.type==='stone')drawStone(o);else if(o.type==='rocks')drawRocks(o);}

function render(t){
  // sky
  ctx.fillStyle=skyColor();ctx.fillRect(0,0,W,H);
  ctx.save();
  if(shakeAmt>0.1){ctx.translate((rng()-0.5)*shakeAmt,(rng()-0.5)*shakeAmt);shakeAmt*=0.86;}
  drawGround();
  drawGrid();
  // build a painter-sorted list of everything on the ground
  const list=[];
  list.push({y:0,draw:drawHearthBase});
  for(const o of scenery)list.push({y:o.y,o,draw:()=>{if(!drawSpriteBillboard(o.type,o,o.r*3.2))drawScenery(o,t);}});
  // buildings anchor at the FRONT of their tile so they sit ON the ground, not above it
  for(const b of builds){const ob={...b,y:b.y+TILE*0.42};list.push({y:b.y,o:b,draw:()=>{if(!drawSpriteBillboard(b.key,ob,BH[b.key]||6))(BDRAW[b.key]||(()=>{}))(ob,t);}});}
  for(const v of villagers)list.push({y:v.y,o:v,draw:()=>{if(!drawSpriteBillboard('villager',v,3.0))drawVillager(v,t);}});
  for(const e of enemies)list.push({y:e.y,o:e,draw:()=>{if(!drawSpriteBillboard(e.boss?'boss':'enemy',e,e.r*3.4))drawEnemy(e,t);}});
  list.sort((a,b)=>a.y-b.y);
  for(const it of list)it.draw();
  // hearth flame over its base
  drawHearthFlame(t);
  // projectiles
  for(const s of shots){const x=sx(s.x),y=sy(s.y)-3*sc()*0.3;ctx.fillStyle=s.cannon?'#2a2a2a':'#ffe6a0';ctx.beginPath();ctx.arc(x,y,(s.cannon?3:2)*sc()/5,0,7);ctx.fill();if(!s.cannon){ctx.strokeStyle='rgba(255,220,150,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(sx(s.x-(s.tx-s.x)*0.02),sy(s.y-(s.ty-s.y)*0.02)-3*sc()*0.3);ctx.stroke();}}
  // node markers (day only, on top so tappable feel)
  if(G.phase==='day')for(const n of nodes)drawNode(n,t);
  drawFx();
  // placement ghost
  if(G.sel)drawGhost();
  ctx.restore();
  lightingOverlay();
  drawNightLights();
  vignette();
}
// buildable grid overlay — faint always, clear during placement
function drawGrid(){
  const show=!!G.sel, reach=Math.ceil(BZONE/TILE)+1;
  ctx.lineWidth=1;
  for(let tx=HC-reach;tx<=HC+reach;tx++)for(let ty=HC-reach;ty<=HC+reach;ty++){
    if(!inGrid(tx,ty)||!inZone(tx,ty))continue;
    const x=sx(tileWX(tx)),gy=sy(tileWY(ty)),hw=TILE*0.5*sc();
    const occ=cellB[ty*GN+tx]||cellN[ty*GN+tx]||(tx===HC&&ty===HC);
    ctx.beginPath();ctx.moveTo(x,gy-hw*TILT);ctx.lineTo(x+hw,gy);ctx.lineTo(x,gy+hw*TILT);ctx.lineTo(x-hw,gy);ctx.closePath();
    if(show){ctx.fillStyle=occ?'rgba(225,80,70,0.13)':'rgba(150,225,160,0.11)';ctx.fill();}
    ctx.strokeStyle=show?'rgba(255,255,255,0.16)':'rgba(255,255,255,0.05)';ctx.stroke();
  }
}
let ghostTile=null;
function drawGhost(){
  const tx=ghostTile?ghostTile.tx:HC,ty=ghostTile?ghostTile.ty:HC;
  const d=CAT[G.sel],wx=tileWX(tx),wy=tileWY(ty);
  const ok=placeable(tx,ty)&&canAfford(d.cost);
  const x=sx(wx),gy=sy(wy),s=sc();
  ctx.globalAlpha=0.5;
  // tile footprint
  ctx.fillStyle=ok?'rgba(120,230,150,0.4)':'rgba(230,90,80,0.4)';
  ctx.beginPath();const hw=TILE*0.5*s;ctx.moveTo(x,gy-hw*TILT);ctx.lineTo(x+hw,gy);ctx.lineTo(x,gy+hw*TILT);ctx.lineTo(x-hw,gy);ctx.closePath();ctx.fill();
  ctx.globalAlpha=0.85;const gob={x:wx,y:wy+TILE*0.42,hp:1,max:1,key:G.sel};if(!drawSpriteBillboard(G.sel,gob,BH[G.sel]||6))(BDRAW[G.sel]||(()=>{}))(gob,0);
  ctx.globalAlpha=1;
  // range ring for towers
  if(d.range){ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.setLineDash([6,5]);ctx.beginPath();ctx.ellipse(x,gy,d.range*s,d.range*s*TILT,0,0,7);ctx.stroke();ctx.setLineDash([]);}
}

const mini=document.getElementById('mini');
function syncHUD(){
  document.getElementById('rWood').textContent=G.res.wood|0;
  document.getElementById('rStone').textContent=G.res.stone|0;
  document.getElementById('rFood').textContent=G.res.food|0;
  document.getElementById('rGold').textContent=G.res.gold|0;
  document.getElementById('rPop').textContent=G.pop+'/'+G.popCap;
  document.getElementById('dayNum').textContent=G.day;
  document.getElementById('bHearth').style.width=Math.max(0,G.hearthHP/G.hearthMax*100)+'%';
  document.getElementById('tHearth').textContent=Math.max(0,G.hearthHP|0)+'/'+G.hearthMax;
  const cl=document.getElementById('clock'),si=document.getElementById('sunIcon');
  if(G.phase==='night'){cl.textContent='NIGHT '+G.day;si.textContent='🌙';}else{cl.textContent='DAY '+G.day;si.textContent='☀';}
  // minimap
  if((syncHUD._c=(syncHUD._c||0)+1)%3===0){
    mini.querySelectorAll('.blip').forEach(b=>b.remove());
    const R=44,sca=0.26;
    function blip(wx,wy,col,sz){const dd=document.createElement('div');dd.className='blip';dd.style.width=dd.style.height=(sz||5)+'px';dd.style.background=col;dd.style.left=(R+wx*sca)+'px';dd.style.top=(R+wy*sca*0.92)+'px';mini.appendChild(dd);}
    blip(0,0,'#ffcf4d',8);
    for(const n of nodes)blip(n.x,n.y,n.kind==='stone'?'#c0c6cc':n.kind==='food'?'#e8c84a':'#7fc46a',4);
    for(const b of builds)blip(b.x,b.y,b.range?'#62c4ff':'#cfe0ff',4);
    for(const v of villagers)blip(v.x,v.y,'#8fe0a0',3);
    for(const e of enemies)blip(e.x,e.y,'#ff5a4a',4);
  }
}
function buildBar(){
  const bb=document.getElementById('buildbar');bb.innerHTML='';
  for(const k of ORDER){const d=CAT[k];const aff=canAfford(d.cost);
    const el=document.createElement('div');el.className='bchip'+(G.sel===k?' sel':'')+(aff?'':' cant');
    el.innerHTML=`<div class="i">${d.ico}</div><div class="n">${d.name}</div><div class="c${aff?'':' no'}">${costStr(d.cost)}</div>`;
    el.onclick=()=>{if(G.sel===k){clearSel();}else{G.sel=k;document.getElementById('cancel').style.display='block';syncBuildBar();}};
    bb.appendChild(el);
  }
}
function syncBuildBar(){
  document.querySelectorAll('.bchip').forEach((el,i)=>{const k=ORDER[i];el.classList.toggle('sel',G.sel===k);el.classList.toggle('cant',!canAfford(CAT[k].cost));});
  const nb=document.getElementById('night');
  if(G.phase==='night'){nb.classList.add('fighting');nb.firstChild.textContent='🌙 NIGHT '+G.day;document.getElementById('nightSub').textContent=Math.max(0,night.toSpawn-night.spawned+enemies.length)+' enemies';}
  else{nb.classList.remove('fighting');nb.firstChild.textContent='⚔ BEGIN NIGHT';document.getElementById('nightSub').textContent='day '+G.day+' · build up';}
}

//----- toast / banner -----
let toastT=0;
function toast(msg,bad){const t=document.getElementById('toast');const e=document.createElement('div');e.className='tmsg';e.textContent=msg;if(bad)e.style.borderColor='#ff8a7a';t.appendChild(e);requestAnimationFrame(()=>e.classList.add('show'));setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300);},1300);}
function banner(big,sm){const b=document.getElementById('banner');document.getElementById('bannerBig').textContent=big;document.getElementById('bannerSm').textContent=sm;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1900);}

//================================================================
//  INPUT
//================================================================
let down=null,panned=false,pinchD=null;
function dist2(ts){return Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY);}
cv.addEventListener('pointerdown',e=>{down={x:e.clientX,y:e.clientY,t:performance.now()};panned=false;});
cv.addEventListener('pointermove',e=>{
  if(!down)return;const dx=e.clientX-down.x,dy=e.clientY-down.y;
  if(!panned&&Math.hypot(dx,dy)>8)panned=true;
  if(panned){cam.x-=dx/cam.zoom;cam.y-=dy/(cam.zoom*TILT);down.x=e.clientX;down.y=e.clientY;clampCam();if(bpop.style.display==='flex')closePop();}
  if(G.sel){const w=screenToWorld(e.clientX,e.clientY);ghostTile=worldToTile(w.x,w.y);}
});
cv.addEventListener('pointerup',e=>{
  if(down&&!panned)tap(e.clientX,e.clientY);
  down=null;
});
cv.addEventListener('touchmove',e=>{if(e.touches.length>=2){const d=dist2(e.touches);if(pinchD)setZoom(cam.zoomT*(d/pinchD));pinchD=d;down=null;e.preventDefault();}},{passive:false});
cv.addEventListener('touchend',e=>{if(e.touches.length<2)pinchD=null;});
cv.addEventListener('wheel',e=>{setZoom(cam.zoomT*(e.deltaY<0?1.12:0.89));e.preventDefault();},{passive:false});
function setZoom(z){cam.zoomT=Math.max(ZMIN,Math.min(ZMAX,z));}
function clampCam(){const L=GN*TILE*0.5;cam.x=Math.max(-L,Math.min(L,cam.x));cam.y=Math.max(-L,Math.min(L,cam.y));}
let selVill=null;
function refund(c){for(const k in c)G.res[k]+=Math.floor((c[k]||0)*0.5);}
function buildAt(w){let b=null,bd=(TILE*0.75)**2;for(const x of builds){const d=(x.x-w.x)**2+(x.y-w.y)**2;if(d<bd){bd=d;b=x;}}return b;}
function nodeAt(w){let n=null,bd=49;for(const x of nodes){const d=(x.x-w.x)**2+(x.y-w.y)**2;if(d<bd){bd=d;n=x;}}return n;}
function villAt(w){let v=null,bd=10;for(const x of villagers){const d=(x.x-w.x)**2+(x.y-w.y)**2;if(d<bd){bd=d;v=x;}}return v;}
function assignVillagerTo(v,n){if(v.node)v.node.workers=Math.max(0,v.node.workers-1);v.node=n;v.state='toNode';n.workers++;toast('Villager → '+(n.kind||'work'));}
function demolish(b){refund(b.cost);if(b.pop)G.popCap=Math.max(G.pop,G.popCap-b.pop);destroyBuild(b);toast(b.name+' removed · refund '+costStr(Object.fromEntries(Object.entries(b.cost).map(([k,v])=>[k,Math.floor(v*0.5)]))));}
const bpop=document.getElementById('bpop');
let popB=null;
function openBuildPopup(b,px,py){
  popB=b;selVill=null;bpop.innerHTML='';
  const ttl=document.createElement('div');ttl.className='ttl';ttl.textContent=b.ico+' '+b.name+'  ('+(b.hp|0)+'hp)';bpop.appendChild(ttl);
  const farmNode=b.node?nodes.find(n=>n.farm&&n.tx===b.tx&&n.ty===b.ty):null;
  if(farmNode){const a=document.createElement('button');a.className='asn';a.textContent='👤 Assign villager';a.onclick=()=>{assignToNode(farmNode);closePop();};bpop.appendChild(a);}
  const rm=document.createElement('button');rm.className='rm';rm.textContent='🗑 Remove (+refund)';rm.onclick=()=>{demolish(b);closePop();};bpop.appendChild(rm);
  bpop.style.display='flex';bpop.style.left=px+'px';bpop.style.top=(py-14)+'px';
}
function closePop(){bpop.style.display='none';popB=null;}
function tap(px,py){
  const w=screenToWorld(px,py);
  if(G.sel){const tl=worldToTile(w.x,w.y);placeBuild(G.sel,tl.tx,tl.ty);return;}
  closePop();
  // a selected villager waiting for a target node?
  if(selVill){const n=nodeAt(w);if(n){assignVillagerTo(selVill,n);selVill=null;return;}selVill=null;}
  // tap a building → action popup (remove / assign-if-farm)
  const b=buildAt(w);if(b){openBuildPopup(b,px,py);return;}
  // tap a resource node → assign nearest idle villager
  const n=nodeAt(w);if(n){assignToNode(n);return;}
  // tap a villager → select it for manual (re)assignment
  const v=villAt(w);if(v){selVill=v;toast(v.node?'Reassign: tap a node':'Tap a resource node to assign');return;}
}
document.getElementById('zin').onclick=()=>setZoom(cam.zoomT*1.2);
document.getElementById('zout').onclick=()=>setZoom(cam.zoomT*0.83);
document.getElementById('night').onclick=beginNight;
document.getElementById('cancel').onclick=clearSel;
document.getElementById('restart').onclick=restart;

//================================================================
//  MAIN LOOP
//================================================================
let tsec=0;
function loop(now){
  const dt=Math.min(0.05,(now-(loop._l||now))/1000);loop._l=now;tsec+=dt;
  cam.zoom+=(cam.zoomT-cam.zoom)*Math.min(1,dt*8);
  if(timeAnim){const k=Math.min(1,(now-timeAnim.t0)/800);timePhase=timeAnim.from+(timeAnim.target-timeAnim.from)*k;if(k>=1)timeAnim=null;}
  if(!G.over){
    updateVillagers(dt,tsec);
    if(G.phase==='night'&&night.active){
      night.spawnT-=dt;
      if(night.spawned<night.toSpawn&&night.spawnT<=0){spawnEnemy();night.spawned++;night.spawnT=Math.max(0.25,0.9-G.day*0.03);}
      for(const e of enemies)enemyStep(e,dt);
      updateTowers(dt,tsec);
      updateShots(dt);
      checkNightEnd();
    }
    updateFx(dt);
  }
  render(tsec);
  syncHUD();
  requestAnimationFrame(loop);
}

//----- boot -----
setupWorld();
buildBar();syncBuildBar();
cam.x=-5;cam.y=-3;
const q=new URLSearchParams(location.search);
if(q.has('t'))timePhase=parseFloat(q.get('t'));
if(q.has('zoom'))cam.zoom=cam.zoomT=parseFloat(q.get('zoom'));
if(q.has('cx'))cam.x=parseFloat(q.get('cx'));
if(q.has('cy'))cam.y=parseFloat(q.get('cy'));
if(q.has('sel')){G.sel=q.get('sel');ghostTile={tx:HC+2,ty:HC+1};}
function boot(){const l=document.getElementById('load');l.style.opacity='0';setTimeout(()=>l.style.display='none',500);requestAnimationFrame(loop);}
setTimeout(boot,300);
window.__ready=true;
</script>
